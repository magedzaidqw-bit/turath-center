<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d2818">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="التراث">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="turath-center-logo.png">
<title>مركز التراث لتحفيظ القرآن الكريم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Amiri+Quran&family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;500;700;900&family=Scheherazade+New:wght@400;700&display=swap');
:root {
  --gd: #0a1e12; --gd2: #112d1c; --gm: #1a5230; --gl: #3d9e6a;
  --gold: #c9a153; --gold2: #e8cd8a; --gold3: #f5e8c0; --gold4: #fff8e7; --red: #7a1f1f;
  --cream: #faf7ef; --gray: #f2ede0; --gray2: #e6dfc8; --mid: #8a8270; --ink: #1a1812;
  --shadow-sm: 0 2px 12px rgba(10,30,18,0.07);
  --shadow-md: 0 8px 28px rgba(10,30,18,0.12);
  --shadow-lg: 0 20px 55px rgba(10,30,18,0.20);
  --gold-glow: 0 0 30px rgba(201,161,83,0.20);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; overflow-x:hidden; }
#app { width:100%; overflow-x:hidden; }
body {
  font-family:'Cairo',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(201,161,83,0.07) 0%, transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(26,82,48,0.05) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(201,161,83,0.03) 0%, transparent 60%);
  background-attachment: fixed;
}

/* SPLASH */
#splash {
  position:fixed; inset:0; z-index:1000;
  width:100%; width:100vw;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(201,161,83,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 0% 100%, rgba(26,82,48,0.3) 0%, transparent 50%),
    linear-gradient(170deg, #07150d 0%, #0e2818 40%, #0a1f13 70%, #111a0f 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#splash::before {
  content:''; position:absolute; inset:0; opacity:0.04; pointer-events:none;
  background-image: 
    repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 1px, transparent 50px),
    repeating-linear-gradient(-45deg, var(--gold) 0, var(--gold) 1px, transparent 1px, transparent 50px);
}
#splash::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,161,83,0.4),transparent);
}
.logo-ring {
  width:140px; height:140px; border-radius:50%;
  border:2px solid rgba(201,161,83,0.6);
  display:flex; align-items:center; justify-content:center;
  font-size:54px; margin-bottom:28px; position:relative;
  background:radial-gradient(circle, rgba(201,161,83,0.06), transparent 70%);
  box-shadow:
    0 0 0 6px rgba(201,161,83,0.08),
    0 0 0 12px rgba(201,161,83,0.04),
    0 0 50px rgba(201,161,83,0.30),
    inset 0 0 20px rgba(0,0,0,0.2);
  overflow:hidden;
  animation: logoGlow 3s ease-in-out infinite alternate;
}
@keyframes logoGlow {
  from { box-shadow: 0 0 0 6px rgba(201,161,83,0.08), 0 0 0 12px rgba(201,161,83,0.04), 0 0 40px rgba(201,161,83,0.25), inset 0 0 20px rgba(0,0,0,0.2); }
  to   { box-shadow: 0 0 0 6px rgba(201,161,83,0.12), 0 0 0 12px rgba(201,161,83,0.06), 0 0 65px rgba(201,161,83,0.40), inset 0 0 20px rgba(0,0,0,0.2); }
}
#splash h1 { font-family:'Amiri',serif; font-size:32px; color:var(--gold3); text-align:center; line-height:1.8; letter-spacing:0.5px; position:relative; text-shadow:0 2px 20px rgba(201,161,83,0.3); }
#splash p { color:rgba(247,243,234,0.55); font-size:13px; margin-top:8px; letter-spacing:1px; position:relative; }
.enter-btn {
  margin-top:44px; padding:16px 60px; border:none; border-radius:50px;
  background:linear-gradient(135deg,var(--gold3),var(--gold2),var(--gold));
  color:var(--gd); font-family:'Cairo',sans-serif; font-size:16px; font-weight:800;
  cursor:pointer; box-shadow:0 8px 30px rgba(201,161,83,0.40), 0 2px 0 rgba(255,255,255,0.3) inset;
  position:relative; transition:transform 0.2s, box-shadow 0.2s;
  letter-spacing:0.5px;
}
.enter-btn:hover { transform:translateY(-3px); box-shadow:0 14px 36px rgba(201,161,83,0.55); }

/* AUTH */
#auth {
  display:none; position:fixed; inset:0; z-index:900;
  width:100%; width:100vw;
  background:linear-gradient(165deg,var(--gd),#0a1f13);
  align-items:center; justify-content:center; padding:24px;
  overflow-y:auto;
}
.auth-card {
  background:var(--cream); border-radius:24px; padding:44px 36px;
  width:100%; max-width:420px; box-shadow:var(--shadow-lg);
  border:1px solid rgba(201,161,83,0.2);
}
.auth-card .logo-sm {
  width:74px; height:74px; border-radius:50%; border:3px solid var(--gold);
  margin:0 auto 22px; display:flex; align-items:center; justify-content:center;
  font-size:34px; background:linear-gradient(135deg,var(--gray),var(--gray2));
  box-shadow:0 0 0 6px rgba(201,161,83,0.08); overflow:hidden;
}
.auth-card h2 { text-align:center; font-family:'Amiri',serif; font-size:22px; color:var(--gd); margin-bottom:5px; }
.auth-card p { text-align:center; color:var(--mid); font-size:13px; margin-bottom:24px; }
.auth-tabs { display:flex; gap:8px; margin-bottom:24px; background:var(--gray); border-radius:12px; padding:4px; }
.auth-tab { flex:1; padding:10px; border:none; background:none; border-radius:9px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; color:var(--mid); cursor:pointer; transition:all 0.2s; }
.auth-tab.active { background:white; color:var(--gd); box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.fg { margin-bottom:18px; }
.fg label { display:block; font-size:13px; font-weight:700; color:var(--gd); margin-bottom:7px; }
.fg input, .fg select, .fg textarea {
  width:100%; padding:13px 16px; border:1.5px solid var(--gray2); border-radius:12px;
  font-family:'Cairo',sans-serif; font-size:14px; background:var(--gray); transition:border-color 0.2s, background 0.2s;
}
.fg input:focus, .fg select:focus { outline:none; border-color:var(--gm); background:white; }
.btn-pri {
  width:100%; padding:15px; border:none; border-radius:14px;
  background:linear-gradient(135deg,var(--gm),var(--gd));
  color:white; font-family:'Cairo',sans-serif; font-size:15px; font-weight:700; cursor:pointer;
  box-shadow:0 6px 18px rgba(31,92,56,0.25); transition:transform 0.15s, box-shadow 0.15s;
}
.btn-pri:hover { transform:translateY(-1px); box-shadow:0 10px 24px rgba(31,92,56,0.3); }
.btn-pri:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

/* HEADER */
.header {
  background:linear-gradient(120deg,var(--gd) 0%,var(--gd2) 50%,#0e2818 100%);
  height:70px; padding:0 28px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  width:100%; left:0; right:0;
  box-shadow:0 4px 24px rgba(10,30,18,0.35);
  border-bottom:1px solid rgba(201,161,83,0.25);
}
.header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(201,161,83,0.5) 30%,rgba(201,161,83,0.8) 50%,rgba(201,161,83,0.5) 70%,transparent 100%);
}
.hbrand { display:flex; align-items:center; gap:12px; }
.hbrand .logo { font-size:26px; filter:drop-shadow(0 0 6px rgba(201,161,83,0.4)); }
.hbrand span { color:var(--gold3); font-weight:700; font-size:20px; font-family:'Scheherazade New',serif; letter-spacing:0.5px; text-shadow: 0 0 8px rgba(201,161,83,0.9), 0 0 20px rgba(201,161,83,0.5), 0 0 35px rgba(201,161,83,0.3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
.huser { display:flex; align-items:center; gap:10px; }
.ubadge { background:rgba(255,255,255,0.08); border:1px solid rgba(201,161,83,0.25); border-radius:50px; padding:7px 16px; color:white; font-size:13px; }
.rtag { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:var(--gd); border-radius:50px; padding:5px 14px; font-size:11px; font-weight:800; letter-spacing:0.3px; }
.lbtn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); color:white; border-radius:10px; padding:8px 16px; font-family:'Cairo',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:background 0.2s; }
.lbtn:hover { background:rgba(255,255,255,0.15); }

/* NAV */
.nav { background:linear-gradient(180deg,#ffffff,#fdfaf3); border-bottom:1px solid var(--gray2); display:flex; overflow-x:auto; padding:0 20px; box-shadow:0 2px 8px rgba(10,30,18,0.05); width:100%; }
.nb { padding:16px 20px; border:none; background:none; font-family:'Cairo',sans-serif; font-size:14px; font-weight:500; color:var(--mid); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:color 0.2s; }
.nb.active { color:var(--gm); border-bottom-color:var(--gold); }
.nb:hover { color:var(--gd); }

/* CONTENT */
.content { padding:28px; max-width:1150px; margin:0 auto; }
.page { display:none; }
.page.active { display:block; animation:fadeIn 0.35s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
.stitle { font-family:'Amiri',serif; font-size:22px; font-weight:700; color:var(--gd); margin-bottom:22px; padding-bottom:12px; border-bottom:0; display:flex; align-items:center; gap:8px; position:relative; }
.stitle::after { content:''; position:absolute; bottom:0; right:0; left:0; height:2px; background:linear-gradient(90deg,var(--gold),rgba(201,161,83,0.2),transparent); }

/* STATS */
.sgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:18px; margin-bottom:28px; }
.sc { background:linear-gradient(135deg,white,#fdfaf3); border-radius:18px; padding:22px; box-shadow:var(--shadow-sm); border-right:4px solid var(--gold); display:flex; align-items:center; gap:16px; transition:box-shadow 0.2s, transform 0.2s; }
.sc:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.si { width:50px; height:50px; border-radius:14px; background:#e8f3ec; display:flex; align-items:center; justify-content:center; font-size:23px; }
.sn { font-size:30px; font-weight:900; color:var(--gd); line-height:1; }
.sl { font-size:12px; color:var(--mid); margin-top:4px; }

/* CARD */
.card { background:white; border-radius:18px; box-shadow:var(--shadow-sm); margin-bottom:22px; overflow:hidden; border:1px solid rgba(13,40,24,0.04); }
.ch { padding:18px 26px; border-bottom:1px solid var(--gray); display:flex; align-items:center; justify-content:space-between; background:linear-gradient(180deg,#fdfcf9,white); flex-wrap:wrap; gap:10px; }
.ch h3 { font-size:15px; font-weight:700; color:var(--gd); }
.cb { padding:22px 26px; }

/* TABLE */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { background:linear-gradient(180deg,var(--gray),var(--gray2)); padding:12px 16px; text-align:right; font-size:12px; font-weight:700; color:var(--gd); white-space:nowrap; border-bottom:2px solid rgba(201,161,83,0.3); }
td { padding:13px 16px; border-bottom:1px solid var(--gray); font-size:13px; }
tr:last-child td { border-bottom:none; }
tbody tr { transition:background 0.15s; }
tbody tr:hover { background:#fbfaf6; }

/* BADGES */
.badge { padding:4px 12px; border-radius:50px; font-size:11px; font-weight:700; display:inline-block; }
.be { background:#e3f3e8; color:#1d6b3a; }
.bg { background:#e0eefb; color:#14568f; }
.br { background:#fdf1d9; color:#a66a0c; }
.bw { background:#fbe4e4; color:#a3262b; }
.bp { background:#e3f3e8; color:#1d6b3a; }
.ba { background:#fbe4e4; color:#a3262b; }
.bex { background:#fdf1d9; color:#a66a0c; }

/* BUTTONS */
.btn { padding:9px 18px; border-radius:10px; border:none; font-family:'Cairo',sans-serif; font-size:12.5px; font-weight:700; cursor:pointer; transition:transform 0.15s, opacity 0.15s; }
.btn:hover { transform:translateY(-1px); }
.btn-g { background:linear-gradient(135deg,var(--gm),var(--gd)); color:white; box-shadow:0 4px 12px rgba(31,92,56,0.2); }
.btn-gold { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:var(--gd); box-shadow:0 4px 12px rgba(201,161,83,0.25); }
.btn-r { background:linear-gradient(135deg,#c0392b,#7a1f1f); color:white; }
.btn-o { background:white; border:1.5px solid var(--gm); color:var(--gm); padding:8px 16px; border-radius:10px; font-family:'Cairo',sans-serif; font-size:12.5px; font-weight:700; cursor:pointer; transition:background 0.15s; }
.btn-o:hover { background:#f0f7f2; }
.btn-sm { padding:5px 12px; font-size:11px; }

/* MODAL */
.mo { display:none; position:fixed; inset:0; background:rgba(13,40,24,0.55); z-index:500; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(2px); }
.mo.open { display:flex; }
.modal { background:white; border-radius:22px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
.modal.wide { max-width:760px; }
.mh { padding:20px 26px; border-bottom:1px solid var(--gray); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:white; z-index:2; }
.mh h3 { font-family:'Amiri',serif; font-size:17px; font-weight:700; color:var(--gd); }
.mc { background:var(--gray); border:none; width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; color:var(--mid); }
.mb { padding:26px; }
.fgrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:600px){
  .content { padding:10px; }
  .header { padding:0 10px; height:60px; }
  .hbrand span { font-size:13px; max-width:100px; }
  .hbrand .logo { font-size:20px; }
  .hbrand img { width:26px; height:26px; }
  .ubadge { font-size:10px; padding:4px 8px; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rtag { font-size:10px; padding:3px 8px; }
  .lbtn { font-size:10px; padding:5px 8px; }
  .nb { padding:10px 12px; font-size:12px; }
  .sgrid { grid-template-columns:1fr 1fr; gap:10px; }
  .sc { padding:12px; }
  .sn { font-size:22px; }
  .modal { max-width:100%; border-radius:16px; margin:8px; }
  .modal.wide { max-width:100%; }
  .notif-panel { left:8px; right:8px; width:auto; }
  .arow { flex-direction:column; align-items:flex-start; }
  .report-reminder-banner { left:10px; right:10px; }
  .huser { gap:6px; }
  .fgrid { grid-template-columns:1fr; }
  .stitle { font-size:16px; }
  .ch { padding:12px 14px; }
  .cb { padding:12px 14px; }
  .btn { padding:8px 12px; font-size:12px; }

  /* الجداول — تمرير أفقي سلس */
  .tw { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  table { font-size:11px; min-width:400px; }
  th, td { padding:7px 6px; white-space:nowrap; }

  /* بطاقات الجوال — تخفي الجداول وتعرض بطاقات */
  .mobile-card-list { display:flex; flex-direction:column; gap:10px; }
  .mobile-card {
    background:white; border-radius:14px; padding:14px 16px;
    border:1px solid var(--gray2); box-shadow:var(--shadow-sm);
  }
  .mobile-card-name { font-size:14px; font-weight:700; color:var(--gd); margin-bottom:8px; }
  .mobile-card-row { display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--mid); padding:4px 0; border-bottom:1px solid var(--gray); }
  .mobile-card-row:last-child { border-bottom:none; }
  .mobile-card-row span:last-child { color:var(--ink); font-weight:600; text-align:left; }
  .mobile-card-actions { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

  /* إخفاء بعض الأعمدة على الجوال */
  .hide-mobile { display:none !important; }

  /* إخفاء الجدول عند عرض البطاقات */
  .tw.hide-on-mobile { display:none !important; }
}

/* تمييز الجداول القابلة للتمرير */
.tw::after {
  content:'';
  display:block;
}
@media(max-width:600px){
  .tw-hint { font-size:10px; color:var(--mid); text-align:center; padding:4px; display:block; }
}

/* STARS */
.stars { display:flex; gap:5px; flex-direction:row-reverse; justify-content:flex-end; margin-top:5px; }
.stars input { display:none; }
.stars label { font-size:24px; cursor:pointer; color:#e0dccb; transition:color 0.1s; }
.stars input:checked ~ label, .stars label:hover, .stars label:hover ~ label { color:var(--gold); }

/* ATT */
.arow { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--gray); border-radius:12px; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
.aopts { display:flex; gap:7px; }
.abtn { padding:6px 14px; border-radius:20px; border:2px solid transparent; font-family:'Cairo',sans-serif; font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; }
.abtn.p { border-color:#1d6b3a; color:#1d6b3a; background:white; }
.abtn.a { border-color:#a3262b; color:#a3262b; background:white; }
.abtn.e { border-color:#a66a0c; color:#a66a0c; background:white; }
.abtn.p.sel { background:#1d6b3a; color:white; }
.abtn.a.sel { background:#a3262b; color:white; }
.abtn.e.sel { background:#a66a0c; color:white; }

/* ALERT */
.alert { padding:12px 16px; border-radius:12px; font-size:13px; margin-bottom:16px; }
.aerr { background:#fbe4e4; color:#a3262b; border-right:4px solid #a3262b; }
.aok { background:#e3f3e8; color:#1d6b3a; border-right:4px solid #1d6b3a; }

.empty { text-align:center; padding:44px; color:var(--mid); }
.empty .ei { font-size:42px; margin-bottom:12px; opacity:0.7; }

.pts { background:linear-gradient(135deg,var(--gold2),var(--gold)); color:var(--gd); border-radius:50px; padding:4px 14px; font-size:11px; font-weight:800; box-shadow:0 2px 8px rgba(201,161,83,0.25); white-space:nowrap; display:inline-flex; align-items:center; gap:3px; }
.sb { background:var(--gray2); border-radius:50px; height:8px; margin-top:4px; }
.sf { height:100%; border-radius:50px; background:linear-gradient(90deg,var(--gm),var(--gl)); }

/* AVATAR / PHOTO UPLOAD */
.photo-up { width:90px; height:90px; border-radius:14px; background:var(--gray); border:2px dashed var(--gray2); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--mid); cursor:pointer; overflow:hidden; position:relative; }
.photo-up img { width:100%; height:100%; object-fit:cover; }
.photo-up input { display:none; }
.avatar-sm { width:36px; height:36px; border-radius:50%; object-fit:cover; border:1.5px solid var(--gold); }
.avatar-placeholder { width:36px; height:36px; border-radius:50%; background:var(--gray); display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--mid); }

/* TOP3 PODIUM */
.podium { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:20px; }
.podium-card { background:white; border-radius:18px; padding:20px; text-align:center; box-shadow:var(--shadow-sm); position:relative; }
.podium-card.first { border:2px solid var(--gold); transform:translateY(-8px); }
.podium-photo { width:72px; height:72px; border-radius:50%; margin:0 auto 12px; object-fit:cover; border:3px solid var(--gold2); }
.podium-photo-placeholder { width:72px; height:72px; border-radius:50%; margin:0 auto 12px; background:var(--gray); display:flex; align-items:center; justify-content:center; font-size:28px; }
.podium-rank { font-size:11px; font-weight:800; color:var(--gold); margin-bottom:4px; }
.podium-name { font-weight:700; color:var(--gd); font-size:14px; margin-bottom:6px; }
.podium-score { font-size:22px; font-weight:900; color:var(--gm); }

.score-detail { display:flex; justify-content:center; gap:10px; margin-top:8px; font-size:10px; color:var(--mid); flex-wrap:wrap; }

.section-sub { font-size:13px; font-weight:700; color:var(--gm); margin:18px 0 10px; }

/* PRINT */

// ===================== نظام البصمة (WebAuthn) =====================
const BIOMETRIC_KEY = 'turath_biometric_cred_' + (location.hostname);

function biometricSupported() {
  return window.PublicKeyCredential !== undefined && 
         typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function';
}

async function biometricAvailable() {
  if (!biometricSupported()) return false;
  try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
  catch(e) { return false; }
}

function hasSavedBiometric() {
  return !!localStorage.getItem(BIOMETRIC_KEY);
}

function getSavedBiometric() {
  try { return JSON.parse(localStorage.getItem(BIOMETRIC_KEY)); } catch(e) { return null; }
}

// عرض زر البصمة إذا كانت محفوظة
async function checkBiometricOnLoad() {
  if (!hasSavedBiometric()) return;
  if (!await biometricAvailable()) return;
  if (authMode === 'teacher') {
    document.getElementById('biometric-btn-wrap').style.display = 'block';
  } else if (authMode === 'admin') {
    document.getElementById('biometric-admin-btn-wrap').style.display = 'block';
  }
}

  banner.innerHTML = `
    <span style="font-size:28px">👆</span>
    <div style="flex:1;min-width:160px">
      <div style="font-weight:800;font-size:14px;margin-bottom:3px">فعّل الدخول بالبصمة</div>
      <div style="font-size:12px;opacity:0.85">ادخل المرة القادمة بلمسة واحدة بدون كتابة</div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="registerBiometric()" 
        style="background:linear-gradient(135deg,var(--gold3),var(--gold));color:var(--gd);border:none;border-radius:10px;padding:9px 16px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer">

      </button>
      <button onclick="document.getElementById('biometric-offer-banner')?.remove()"
        style="background:rgba(255,255,255,0.12);color:white;border:none;border-radius:10px;padding:9px 12px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer">
        لاحقاً
      </button>
    </div>`;
  document.body.appendChild(banner);
}

// تسجيل البصمة
async function registerBiometric() {
  document.getElementById('biometric-offer-banner')?.remove();
  if (!CU || !CP) return;
  try {
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new TextEncoder().encode(CU.id.replace(/-/g,'').substring(0,16));
    
    const credential = await navigator.credentials.create({ publicKey: {
      challenge,
      rp: { name: 'مركز التراث', id: location.hostname },
      user: { id: userId, name: CP.full_name, displayName: CP.full_name },
      pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 60000
    }});

    // حفظ بيانات البصمة
    const saved = {
      credId: Array.from(new Uint8Array(credential.rawId)),
      email: CU.email,
      name: CP.full_name,
      role: CP.role,
      pass: window._adminPassTemp || CU.email.split('@')[0]
    };
    localStorage.setItem(BIOMETRIC_KEY, JSON.stringify(saved));

    showGlobalError('✅ تم تفعيل البصمة — ستظهر عند الدخول القادم');
    setTimeout(() => document.getElementById('global-err-banner')?.remove(), 3000);
    document.getElementById('global-err-banner').style.background = '#e3f3e8';
    document.getElementById('global-err-banner').style.color = '#1d6b3a';

// الدخول بالبصمة
async function doBiometricLogin() {
  const saved = getSavedBiometric();
  if (!saved) return;
  const btn = document.getElementById('biometric-login-btn');
  btn.disabled = true; btn.innerHTML = '<span style="font-size:22px">⏳</span> جارٍ التحقق...';
  try {
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const credId = new Uint8Array(saved.credId);

    await navigator.credentials.get({ publicKey: {
      challenge,
      rpId: location.hostname,
      allowCredentials: [{ id: credId, type: 'public-key' }],
      userVerification: 'required',
      timeout: 60000
    }});

    // البصمة صحيحة — الآن نسجل الدخول تلقائياً
    const savedPass = saved.pass || saved.email.split('@')[0];
    console.log('Biometric login for role:', saved.role, 'email:', saved.email);
    const { data, error } = await sb.auth.signInWithPassword({ 
      email: saved.email, 
      password: savedPass
    });
    if (error) {
      showAlert('auth-alert', 'تعذر الدخول — ربما تغيرت كلمة المرور. ادخل يدوياً مرة واحدة.', 'err');
      btn.disabled = false; btn.innerHTML = '<span style="font-size:22px">👆</span> دخول بالبصمة';
      return;
    }
    CU = data.user;
    await loadProfile();
  } catch(e) {
    btn.disabled = false; btn.innerHTML = '<span style="font-size:22px">👆</span> دخول بالبصمة';
    if (e.name !== 'NotAllowedError') showAlert('auth-alert','فشل التحقق بالبصمة','err');
  }
}

const _cache = {};
async function cachedFetch(key, fetchFn, ttlMs = 60000) {
  const now = Date.now();
  if (_cache[key] && (now - _cache[key].ts) < ttlMs) return _cache[key].data;
  const data = await fetchFn();
  _cache[key] = { data, ts: now };
  return data;
}
function clearCache(key) { if (key) delete _cache[key]; else Object.keys(_cache).forEach(k=>delete _cache[k]); }

}

function previewPhoto(inputId, holderId) {
  const input = document.getElementById(inputId);
  const holder = document.getElementById(holderId);
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { holder.innerHTML = `<img src="${e.target.result}">`; holder.appendChild(input); };
    reader.readAsDataURL(input.files[0]);
  }
}

async function uploadPhoto(inputId, bucket) {
  const input = document.getElementById(inputId);
  if (!input.files || !input.files[0]) return null;
  const file = input.files[0];
  const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${file.name.split('.').pop()}`;
  const { data, error } = await sb.storage.from(bucket).upload(fileName, file);
  if (error) { console.error(error); return null; }
  const { data: urlData } = sb.storage.from(bucket).getPublicUrl(fileName);
  return urlData.publicUrl;
}

async function populateModals(id) {
  if (id==='m-circle') await populateSel('c-teacher','teachers');
  if (id==='m-student') {
    if (CP.role === 'teacher') {
      // المحفظ يرى حلقاته فقط
      const { data } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id).order('name');
      const sel = document.getElementById('s-circle');
      if (sel) sel.innerHTML = '<option value="">اختر الحلقة</option>' + (data?.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')||'');
    } else {
      await populateSel('s-circle','circles');
    }
  }
  if (id==='m-memo') { populateSurahSelects(); }
  if (id==='m-eval') {
    if (CP.role === 'supervisor') {
      // المشرف يرى فقط محفظي حلقاته
      const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
      const circleIds = links?.map(l => l.circle_id) || [];
      const { data: teachers } = await sb.from('circles').select('teacher_id,teacher_name').in('id', circleIds);
      const unique = []; const seen = new Set();
      teachers?.forEach(t => { if (t.teacher_id && !seen.has(t.teacher_id)) { seen.add(t.teacher_id); unique.push(t); } });
      const sel = document.getElementById('ev-teacher');
      sel.innerHTML = '<option value="">اختر المحفظ</option>' + unique.map(t => `<option value="${t.teacher_id}">${t.teacher_name||t.teacher_id}</option>`).join('');
    } else {
      await populateSel('ev-teacher','teachers');
    }
  }
  if (id==='m-supervisor') await populateMultiSel('sv-circles');
}

async function populateSel(selId, type) {
  const sel = document.getElementById(selId);
  if (!sel) return;
  if (type === 'circles') {
    const data = await cachedFetch('circles_list', async () => {
      const { data } = await sb.from('circles').select('id,name').order('name');
      return data;
    }, 120000);
    const isFilter = selId.includes('filter') || selId === 'att-circle' || selId === 'top3-circle';
    sel.innerHTML = (isFilter ? '<option value="">الكل</option>' : '<option value="">اختر الحلقة</option>') + (data?.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')||'');
  } else if (type === 'teachers') {
    const data = await cachedFetch('teachers_list', async () => {
      const { data } = await sb.from('profiles').select('id,full_name').eq('role','teacher').order('full_name');
      return data;
    }, 120000);
    sel.innerHTML = '<option value="">اختر المحفظ</option>' + (data?.map(t=>`<option value="${t.id}">${t.full_name}</option>`).join('')||'');
  } else if (type === 'students-full') {
    const { data } = await sb.from('students').select('id,full_name,circles(name,teacher_name)').order('full_name');
    sel.innerHTML = '<option value="">اختر الطالب</option>' + (data?.map(s=>`<option value="${s.id}">${s.full_name} — ${s.circles?.name||'—'}</option>`).join('')||'');
  }
}

async function populateMultiSel(selId) {
  const { data } = await sb.from('circles').select('id,name').order('name');
  const sel = document.getElementById(selId);
  if (sel && data) sel.innerHTML = data.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function showGlobalError(msg) {
  const existing = document.getElementById('global-err-banner');

  banner.style.cssText = 'position:fixed;top:70px;right:16px;left:16px;max-width:500px;margin:0 auto;background:#fbe4e4;border:1.5px solid #a3262b;color:#a3262b;border-radius:12px;padding:12px 16px;font-size:13px;z-index:600;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 16px rgba(163,38,43,0.15)';
  banner.innerHTML = `<span>⚠️ ${msg}</span><button onclick="document.getElementById('global-err-banner')?.remove()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#a3262b">✕</button>`;
  document.body.appendChild(banner);

async function loadTeachers() {
  const [{ data: circleTeachers }, { data: profileTeachers }, { data: evs }] = await Promise.all([
    sb.from('circles').select('teacher_name').order('teacher_name'),
    sb.from('profiles').select('*').eq('role','teacher'),
    sb.from('teacher_evaluations').select('teacher_id,total_score')
  ]);
  const avgs = {}; evs?.forEach(e=>{ if(!avgs[e.teacher_id]) avgs[e.teacher_id]=[]; avgs[e.teacher_id].push(e.total_score); });

  // Unique teacher names from circles
  const circleNames = [...new Set((circleTeachers||[]).map(c=>c.teacher_name).filter(Boolean))];
  // Profile teachers (have accounts)
  const profileIds = new Set((profileTeachers||[]).map(t=>t.full_name));

  const b = document.getElementById('teachers-body');
  let rows = '';
  let rowNum = 1;

  // First: teachers with accounts (profiles)
  (profileTeachers||[]).forEach(t=>{
    const sc = avgs[t.id]||[], avg = sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
    const photo = t.civil_id_photo ? `<img src="${t.civil_id_photo}" class="avatar-sm">` : `<div class="avatar-placeholder">👤</div>`;
    rows += `<tr><td style="color:var(--mid);font-weight:700">${rowNum++}</td><td>${photo}</td><td><strong>${t.full_name}</strong></td><td>${t.civil_id||'—'}</td><td>${t.phone||'—'}</td><td><span class="badge be">حساب نشط</span></td>
      <td>${avg!==null?`<div style="display:flex;align-items:center;gap:6px"><strong style="min-width:45px;font-size:12px">${avg}/60</strong><div style="flex:1;background:#eee;border-radius:4px;height:6px;max-width:80px"><div style="background:#1d6b3a;border-radius:4px;height:6px;width:${Math.round(avg/60*100)}%"></div></div></div>`:'لم يُقيَّم'}</td>
      <td><button class="btn btn-gold btn-sm" onclick="openEvalFor('${t.id}')">تقييم</button> <button class="btn btn-o btn-sm" onclick="editProfile('${t.id}','${esc(t.full_name)}','${esc(t.phone||'')}','teacher')">✏️</button> <button class="btn btn-r btn-sm" onclick="delTeacher('${t.id}')">حذف</button></td></tr>`;
  });

  // Second: teachers from circles who don't have profiles yet
  circleNames.filter(n=>!profileIds.has(n)).forEach(name=>{
    rows += `<tr><td style="color:var(--mid);font-weight:700">${rowNum++}</td><td><div class="avatar-placeholder">👤</div></td><td><strong>${name}</strong></td><td>—</td><td>—</td><td><span class="badge br">بدون حساب</span></td><td>لم يُقيَّم</td>
      <td><small style="color:var(--mid)">أضف حساباً له</small></td></tr>`;
  });

  b.innerHTML = rows || emptyRow(8,'لا يوجد محفظون');

  // بطاقات الجوال للمحفظين
  if (isMobile()) {
    const mobileData = (profileTeachers||[]).map(t => {
      const sc = avgs[t.id]||[], avg = sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
      return { ...t, _name: t.full_name, _avg: avg };
    });
    // إخفاء الجدول وإظهار البطاقات
    const tw = document.querySelector('#teachers-body-table')?.closest('.tw');
    if (tw) tw.style.display = 'none';
    const cardsEl = document.getElementById('teachers-mobile-cards');
    if (cardsEl) {
      cardsEl.style.display = 'block';
      cardsEl.innerHTML = '<div class="mobile-card-list">' + mobileData.map(r => `
        <div class="mobile-card">
          <div class="mobile-card-name">${r.full_name}</div>

function editProfile(id, name, phone, role) {
  const newName = prompt('تعديل الاسم:', name);

function populateSurahSelects() {
  const opts = '<option value="">اختر السورة</option>' + 
    SURAHS.map(s => `<option value="${s.name}" data-verses="${s.v}">${s.n}. ${s.name} (${s.v} آية)</option>`).join('');
  ['memo-sf','memo-st'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = opts;
  });
}

function populateVerseSelect(verseId, surahId) {
  const surahSel = document.getElementById(surahId);
  const verseSel = document.getElementById(verseId);
  if (!surahSel || !verseSel) return;
  const selected = surahSel.options[surahSel.selectedIndex];
  const maxVerses = parseInt(selected?.dataset?.verses) || 0;
  if (maxVerses) {
    verseSel.innerHTML = '<option value="">اختر الآية</option>' + 
      Array.from({length: maxVerses}, (_, i) => `<option value="${i+1}">الآية ${i+1}</option>`).join('');
  } else {
    verseSel.innerHTML = '<option value="">اختر السورة أولاً</option>';
  }
  calcTotalVerses();
}

function calcTotalVerses() {
  const sf = document.getElementById('memo-sf')?.value;
  const af = parseInt(document.getElementById('memo-af')?.value) || 0;
  const st = document.getElementById('memo-st')?.value;
  const at = parseInt(document.getElementById('memo-at')?.value) || 0;
  if (!sf || !st || !af || !at) return;
  
  const fromSurah = SURAHS.find(s => s.name === sf);
  const toSurah = SURAHS.find(s => s.name === st);
  if (!fromSurah || !toSurah) return;
  
  let total = 0;
  if (fromSurah.n === toSurah.n) {
    total = at - af + 1;
  } else {
    total += fromSurah.v - af + 1;
    for (let i = fromSurah.n + 1; i < toSurah.n; i++) {
      total += SURAHS[i-1].v;
    }
    total += at;
  }
  const el = document.getElementById('memo-v');
  if (el && total > 0) el.value = total;
}

function filterStudentsLocal() {
  const q = document.getElementById('search-students')?.value?.trim().toLowerCase() || '';
  const rows = document.querySelectorAll('#students-body tr');
  let count = 0;
  rows.forEach(row => {
    if (row.querySelector('td[colspan]')) return; // تجاهل صف "لا يوجد طلاب"
    const text = row.textContent.toLowerCase();
    if (!q || text.includes(q)) {
      row.style.display = '';
      count++;
    } else {
      row.style.display = 'none';
    }
  });
  // عرض عدد النتائج
  const counter = document.getElementById('search-counter');
  if (counter) counter.textContent = q ? `${count} نتيجة` : '';
}

async function loadStudents() {
  showLoading('students-body');
  const cf = document.getElementById('filter-circle')?.value;
  // ملء فلتر الحلقات للمدير إذا كان فارغاً
  if (CP.role === 'admin') {
    const filterSel = document.getElementById('filter-circle');
    if (filterSel && filterSel.options.length <= 1) {
      const { data: circles } = await sb.from('circles').select('id,name').order('name');
      circles?.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;
        filterSel.appendChild(opt);
      });
    }
  }
  let q = sb.from('students').select('*,circles(name,teacher_name)').order('full_name');
  
  if (CP.role === 'teacher' || CP.role === 'supervisor') {
    // المحفظ والمشرف يريان طلاب حلقاتهم فقط
    let myCircles;
    if (CP.role === 'teacher') {
      const { data } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
      myCircles = data;
    } else {
      const { data } = await sb.from('supervisor_circles').select('circle_id,circles(id,name)').eq('supervisor_id', CU.id);
      myCircles = data?.map(l => l.circles) || [];
    }
    if (myCircles && myCircles.length > 0) {
      // ملء فلتر الحلقات لأول مرة فقط
      const filterSel = document.getElementById('filter-circle');
      if (filterSel && filterSel.options.length <= 1) {
        myCircles.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.name;
          filterSel.appendChild(opt);
        });
      }
      // تطبيق الفلتر
      if (cf) {
        q = q.eq('circle_id', cf);
      } else {
        const circleIds = myCircles.map(c => c.id);
        q = q.in('circle_id', circleIds);
      }
    } else {
      const b = document.getElementById('students-body');
      if (b) b.innerHTML = emptyRow(7,'لم يتم تعيينك في أي حلقة بعد. تواصل مع المدير.');
      return;
    }
  } else if (cf) {
    q = q.eq('circle_id', cf);
  }
  
  const { data } = await q;
  const b = document.getElementById('students-body');
  if (!b) return;
  window._studentsCache = data || [];
  if (isMobile()) {
    // إخفاء الجدول وإظهار البطاقات
    const tw = document.querySelector('#students-body-table')?.closest('.tw');
    if (tw) tw.style.display = 'none';
    const cardsEl = document.getElementById('students-mobile-cards');
    if (cardsEl) {
      cardsEl.style.display = 'block';
      cardsEl.innerHTML = '<div class="mobile-card-list">' + (data||[]).map(s => `
        <div class="mobile-card">
          <div class="mobile-card-name">${s.full_name}</div>
          <div class="mobile-card-row"><span>الحلقة</span><span>${s.circles?.name||'—'}</span></div>
          <div class="mobile-card-row"><span>المحفظ</span><span>${s.circles?.teacher_name||'—'}</span></div>
          <div class="mobile-card-row"><span>النقاط</span><span>⭐ ${s.total_points||0}</span></div>
          <div class="mobile-card-actions">
            <button class="btn btn-gold btn-sm" onclick="openPts('${s.id}','${s.full_name}')">+نقاط</button>
            <button class="btn btn-o btn-sm" onclick="editStudent('${s.id}')">✏️</button>
            <button class="btn btn-r btn-sm" onclick="delStudent('${s.id}')">حذف</button>
          </div>
        </div>`).join('') + '</div>';
    }
  } else {
    const tw = document.querySelector('#students-body-table')?.closest('.tw');
    if (tw) tw.style.display = '';
    const cardsEl = document.getElementById('students-mobile-cards');
    if (cardsEl) cardsEl.style.display = 'none';
    b.innerHTML = data?.length ? data.map((s,i)=>{
      const photo = s.photo ? `<img src="${s.photo}" class="avatar-sm">` : `<div class="avatar-placeholder">🧒</div>`;

async function saveStudent() {
  const name=v('s-name'), circle=v('s-circle'), civilId=v('s-civilid'), birth=v('s-birth');
  const parentPhone=v('s-parent-phone'), parentPass=v('s-parent-pass');
  const parentName=v('s-parent-name'), parentCivilId=v('s-parent-civilid'), parentRelation=v('s-parent-relation');
  const schoolLevel=v('s-school-level'), schoolType=v('s-school-type'), area=v('s-area');
  const currentLevel=v('s-current-level');
  if (!name) { alert('أدخل اسم الطالب'); return; }

  if (editingStudentId) {
    const photoUrl = await uploadPhoto('s-photo','student-photos');
    const civilPhotoUrl = await uploadPhoto('s-civilphoto','civil-ids');
    const updates = { 
      full_name:name, circle_id: circle||null, civil_id: civilId, birth_year: birth||null,
      school_level: schoolLevel||null, school_type: schoolType||null, area: area||null,
      current_level: currentLevel||null, parent_name: parentName||null,
      parent_civil_id: parentCivilId||null, parent_relation: parentRelation||null,
      parent_phone: parentPhone||null
    };
    if (photoUrl) updates.photo = photoUrl;
    if (civilPhotoUrl) updates.civil_id_photo = civilPhotoUrl;

    // إنشاء حساب ولي الأمر إذا أُدخل رقم الجوال وكلمة المرور
    if (parentPhone && parentPass) {
      const parentEmail = parentPhone + '@' + PHONE_DOMAIN;
      const { data: existing } = await sb.from('profiles').select('id').eq('phone', parentPhone).eq('role','parent').maybeSingle();
      if (existing) {
        updates.parent_id = existing.id;
      } else {
        const { data: authData, error } = await sb.auth.signUp({ email: parentEmail, password: parentPass });
        if (error) {
          alert('تنبيه: تعذر إنشاء حساب ولي الأمر (' + error.message + ').');
        } else if (authData.user) {
          await sb.from('profiles').insert({ id: authData.user.id, full_name: parentName || ('ولي أمر ' + name), role:'parent', phone: parentPhone });
          updates.parent_id = authData.user.id;
        }
      }
    } else if (parentPhone) {
      // إذا أُدخل رقم الجوال بدون كلمة مرور — استخدم رقم الجوال كلمةً افتراضية
      const parentEmail = parentPhone + '@' + PHONE_DOMAIN;
      const { data: existing } = await sb.from('profiles').select('id').eq('phone', parentPhone).eq('role','parent').maybeSingle();
      if (existing) {
        updates.parent_id = existing.id;
      } else {
        const { data: authData, error } = await sb.auth.signUp({ email: parentEmail, password: parentPhone });
        if (!error && authData.user) {
          await sb.from('profiles').insert({ id: authData.user.id, full_name: parentName || ('ولي أمر ' + name), role:'parent', phone: parentPhone });
          updates.parent_id = authData.user.id;
        }
      }
    }

    await sb.from('students').update(updates).eq('id', editingStudentId);
    editingStudentId = null;
    document.querySelector('#m-student .mh h3').textContent = 'إضافة طالب';
    document.querySelector('#m-student .btn-pri').textContent = 'حفظ';
    closeM('m-student');
    alert(updates.parent_id ? '✅ تم تحديث بيانات الطالب وربطه بولي الأمر' : '✅ تم تحديث بيانات الطالب');
    loadStudents();
    return;
  }

  const photoUrl = await uploadPhoto('s-photo','student-photos');
  const civilPhotoUrl = await uploadPhoto('s-civilphoto','civil-ids');
  let targetCircle = circle;
  if (CP.role === 'teacher' && !targetCircle) {
    const { data: myCircle } = await sb.from('circles').select('id').eq('teacher_id', CU.id).single();
    targetCircle = myCircle?.id;
  }

  let parentId = null;
  if (parentPhone && parentPass) {
    const parentEmail = parentPhone + '@' + PHONE_DOMAIN;
    const { data: existing } = await sb.from('profiles').select('id').eq('phone', parentPhone).eq('role','parent').maybeSingle();
    if (existing) {
      parentId = existing.id;
    } else {
      const { data: authData, error } = await sb.auth.signUp({ email: parentEmail, password: parentPass });
      if (error) {
        alert('تنبيه: تعذر إنشاء حساب ولي الأمر (' + error.message + '). سيُحفظ الطالب بدون ربط.');
      } else if (authData.user) {
        await sb.from('profiles').insert({ id: authData.user.id, full_name: parentName || ('ولي أمر ' + name), role:'parent', phone: parentPhone });
        parentId = authData.user.id;
      }
    }
  }

  await sb.from('students').insert({ 
    full_name:name, circle_id: targetCircle||null, civil_id: civilId, birth_year: birth||null, 
    photo: photoUrl, civil_id_photo: civilPhotoUrl, parent_id: parentId,
    school_level: schoolLevel||null, school_type: schoolType||null, area: area||null,
    current_level: currentLevel||null, parent_name: parentName||null,
    parent_civil_id: parentCivilId||null, parent_relation: parentRelation||null,
    parent_phone: parentPhone||null
  });
  closeM('m-student');
  alert(parentId ? '✅ تم حفظ الطالب وإنشاء حساب ولي الأمر.' : '✅ تم حفظ الطالب.');
  loadStudents();
}

function setAttQuick(sid, st) {
  const map = {p:'present', a:'absent', e:'excused'};
  attData[sid] = map[st];

  // تحديث الأزرار
  ['p','a','e'].forEach(x => {
    const btn = document.getElementById(`abtn-${x}-${sid}`);
    if (!btn) return;
    const colors = { p:'#1d6b3a', a:'#a3262b', e:'#a66a0c' };
    if (x === st) {
      btn.style.background = colors[x];
      btn.style.color = 'white';
    } else {
      btn.style.background = 'var(--gray)';
      btn.style.color = 'var(--mid)';
    }
  });

  // تحديث الصف
  const row = document.getElementById(`arow-${sid}`);
  if (row) {
    row.style.background = st==='p' ? '' : st==='a' ? '#fbe4e4' : '#fdf1d9';
  }

  // تحديث الإحصائيات
  const total = Object.keys(attData).length;
  updateAttStats(total);
}

function updateAttStats(total) {
  const present = Object.values(attData).filter(v=>v==='present').length;
  const absent  = Object.values(attData).filter(v=>v==='absent').length;
  const excused = Object.values(attData).filter(v=>v==='excused').length;

  let statsEl = document.getElementById('att-stats');
  if (!statsEl) {
    statsEl = document.createElement('div');
    statsEl.id = 'att-stats';
    statsEl.style.cssText = 'display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap';
    document.getElementById('att-list').before(statsEl);
  }
  statsEl.innerHTML = `
    <span class="badge be">✓ حاضر: ${present}</span>
    <span class="badge ba">✗ غائب: ${absent}</span>
    <span class="badge bex">~ بعذر: ${excused}</span>
    <span class="badge bg">المجموع: ${total}</span>`;
}

function printTable(title, tableId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const clone = table.cloneNode(true);
  // remove action columns and photo columns
  const headRow = clone.querySelector('thead tr');
  if (headRow) {
    const headers = Array.from(headRow.children);
    const removeIdx = [];
    headers.forEach((h,i) => {
      if (['إجراءات','حذف','واتساب','الصورة'].includes(h.textContent.trim())) removeIdx.push(i);
    });
    removeIdx.reverse().forEach(i => {
      headRow.children[i]?.remove();
      clone.querySelectorAll('tbody tr').forEach(tr => tr.children[i]?.remove());
    });
  }
  // strip buttons and images leftover in any remaining cells
  clone.querySelectorAll('button').forEach(b=>b.remove());
  clone.querySelectorAll('img').forEach(img=>img.remove());
  clone.querySelectorAll('.avatar-placeholder').forEach(a=>a.remove());

  document.getElementById('print-title').textContent = title + ' — مركز التراث لتحفيظ القرآن الكريم — فرع الجهراء';
  document.getElementById('print-date').textContent = 'تاريخ الطباعة: ' + new Date().toLocaleDateString('ar-KW');
  document.getElementById('print-table').innerHTML = '';
  document.getElementById('print-table').appendChild(clone);
  window.print();
}

async function openBulkHifz() {

  const div = document.getElementById('bulk-students');
  div.innerHTML = '<div style="color:#999;font-size:13px">جاري التحميل...</div>';
  openM('m-bulk-hifz');
  let q = sb.from('students').select('id,full_name,circle_id').order('full_name');
  if (CP.role === 'teacher') {
    const { data: mc } = await sb.from('circles').select('id').eq('teacher_id', CU.id);
    const cids = mc?.map(c=>c.id)||[];
    if (cids.length) q = q.in('circle_id', cids);
  }
  const { data: students } = await q;
  if (!students?.length) { div.innerHTML = '<div style="color:#999">لا يوجد طلاب</div>'; return; }
  div.innerHTML = students.map(s => `<label style="display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer"><input type="checkbox" value="${s.id}" checked style="width:18px;height:18px;accent-color:var(--gm)"><span style="font-size:14px">${s.full_name}</span></label>`).join('');
}
function calcBulkVerses() {
  const sf=document.getElementById('bulk-sf')?.value, af=document.getElementById('bulk-af')?.value;
  const st=document.getElementById('bulk-st')?.value, at=document.getElementById('bulk-at')?.value;
  if (sf&&af&&st&&at) {
    const si=SURAHS.findIndex(s=>s.name===sf), ei=SURAHS.findIndex(s=>s.name===st);
    if (si<0||ei<0) return;
    let total = si===ei ? Math.max(0,parseInt(at)-parseInt(af)+1) : SURAHS[si].v-parseInt(af)+1;
    if (si!==ei) { for(let i=si+1;i<ei;i++) total+=SURAHS[i].v; total+=parseInt(at); }
    document.getElementById('bulk-v').value = total;
  }
}
function toggleAllBulk() {
  const boxes = document.querySelectorAll('#bulk-students input[type=checkbox]');
  const allChecked = [...boxes].every(b=>b.checked);
  boxes.forEach(b => b.checked = !allChecked);
}
async function saveBulkHifz() {

  const sf=document.getElementById('bulk-sf').value, af=document.getElementById('bulk-af').value;
  const st=document.getElementById('bulk-st').value, at=document.getElementById('bulk-at').value;

async function saveMemo() {

async function loadMemo() {
  showLoading('memo-body');
  let qh = sb.from('memorization_log').select('*,students(full_name,circle_id)').order('date',{ascending:false}).limit(50);

  if (CP.role === 'teacher') {
    const { data: myCircles } = await sb.from('circles').select('id').eq('teacher_id', CU.id);
    const myCircleIds = myCircles?.map(c=>c.id) || [];
    const { data: myStudents } = await sb.from('students').select('id').in('circle_id', myCircleIds);
    const myStudentIds = myStudents?.map(s=>s.id) || [];
    if (myStudentIds.length) {
      qh = qh.in('student_id', myStudentIds);
    }
    const { data:h } = await qh;
    const { data:r } = await sb.from('review_log').select('*,students(full_name,circle_id)').in('student_id', myStudentIds).order('date',{ascending:false}).limit(50);
    let combined = [...(h||[]).map(x=>({...x,_t:'حفظ',_tbl:'memorization_log'})), ...(r||[]).map(x=>({...x,_t:'مراجعة',_tbl:'review_log'}))];
    combined = combined.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,40);
    renderMemoMobile(combined);
    return;
  }

  // للمدير والمشرف - نجلب آخر 40 سجل فقط مع فلتر
  const { data:h } = await qh;
  const { data: allStudents } = await sb.from('students').select('id').limit(500);
  const allStudentIds = allStudents?.map(s=>s.id) || [];
  const { data:r } = allStudentIds.length 
    ? await sb.from('review_log').select('*,students(full_name,circle_id)').in('student_id', allStudentIds).order('date',{ascending:false}).limit(50)
    : { data: [] };
  let combined = [...(h||[]).map(x=>({...x,_t:'حفظ',_tbl:'memorization_log'})), ...(r||[]).map(x=>({...x,_t:'مراجعة',_tbl:'review_log'}))];
  combined = combined.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,40);
  renderMemoMobile(combined);
}

async function saveAllBehavior() {
  const date = v('beh-week-date') || today();
  const entries = Object.entries(behData);
  if (!entries.length) { alert('لا يوجد طلاب لحفظ تقييماتهم'); return; }

  const btn = document.querySelector('#beh-save-area button');
  btn.disabled = true; btn.textContent = '⏳ جارٍ الحفظ...';

  const records = entries.map(([sid, d]) => ({
    student_id: sid, date, score: d.score,
    notes: d.notes || null, recorded_by: CU.id
  }));

  // حذف تقييمات نفس الأسبوع أولاً ثم إدراج الجديدة
  const weekStart = new Date(date);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  const studentIds = entries.map(([sid]) => sid);
  await sb.from('behavior_log')
    .delete()
    .in('student_id', studentIds)
    .gte('date', weekStart.toISOString().split('T')[0])
    .lte('date', weekEnd.toISOString().split('T')[0]);

  await sb.from('behavior_log').insert(records);

  // نقاط للسلوك الممتاز
  for (const [sid, d] of entries) {
    if (d.score >= 4) await addPts(sid, d.score===5?8:4, 'سلوك متميز');
  }

  btn.disabled = false; btn.textContent = '💾 حفظ تقييمات الأسبوع';
  alert(`✅ تم حفظ تقييمات ${entries.length} طالب`);
  loadBehavior();
}

async function changePassword() {
  const p1 = v('new-pass'), p2 = v('new-pass2');
  if (!p1) { showAlert('pass-alert','أدخل كلمة المرور الجديدة','err'); return; }
  if (p1.length < 6) { showAlert('pass-alert','كلمة المرور 6 أحرف على الأقل','err'); return; }
  if (p1 !== p2) { showAlert('pass-alert','كلمتا المرور غير متطابقتان','err'); return; }
  const { error } = await sb.auth.updateUser({ password: p1 });
  if (error) { showAlert('pass-alert','خطأ: ' + error.message,'err'); return; }
  showAlert('pass-alert','✅ تم تغيير كلمة المرور بنجاح','ok');
  document.getElementById('new-pass').value = '';
  document.getElementById('new-pass2').value = '';
  setTimeout(() => closeM('m-change-pass'), 2000);
}

// ===================== TOP 3 (الأبطال) =====================
let _top3AllScored = []; // كل الطلاب مرتبين للتعديل
let _top3Selected = [null, null, null]; // الأبطال المختارون (0=أول، 1=ثاني، 2=ثالث)

async function loadTop3() {
  const sel = document.getElementById('top3-circle');
  if (sel && sel.options.length <= 1) {
    if (CP.role === 'teacher') {
      const { data: circles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
      if (circles?.length) {
        sel.innerHTML = '<option value="">اختر حلقة لعرض أبطالها</option>' + circles.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        if (circles.length === 1) sel.value = circles[0].id;
      }
    } else if (CP.role === 'supervisor') {
      const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
      if (links?.length) {
        const ids = links.map(l => l.circle_id);
        const { data: circles } = await sb.from('circles').select('id,name').in('id', ids);
        sel.innerHTML = '<option value="">اختر حلقة لعرض أبطالها</option>' + (circles||[]).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      }
    } else {
      await populateSel('top3-circle','circles');
    }
  }

  const cid = v('top3-circle');
  const periodDays = parseInt(document.getElementById('top3-period')?.value || '30');
  const container = document.getElementById('top3-content');
  if (!cid) { container.innerHTML = emptyDiv('🏆','اختر حلقة لعرض الترتيب'); return; }

  container.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ حساب التقييمات...</p></div>';

  // حساب تاريخ البداية
  let fromDate = null;
  if (periodDays > 0) {
    const d = new Date();
    d.setDate(d.getDate() - periodDays);
    fromDate = d.toISOString().split('T')[0];
  }

  const { data: students } = await sb.from('students').select('*').eq('circle_id', cid);
  if (!students?.length) { container.innerHTML = emptyDiv('🎓','لا يوجد طلاب في هذه الحلقة'); return; }

  const scored = [];
  for (const s of students) {
    let memoQ = sb.from('memorization_log').select('mastery,verses_count').eq('student_id', s.id);
    let attQ  = sb.from('attendance').select('status').eq('student_id', s.id);
    let behQ  = sb.from('behavior_log').select('score').eq('student_id', s.id);
    if (fromDate) {
      memoQ = memoQ.gte('date', fromDate);
      attQ  = attQ.gte('date', fromDate);
      behQ  = behQ.gte('date', fromDate);
    }
    const { data: memo } = await memoQ;
    const { data: att }  = await attQ;
    const { data: beh }  = await behQ;

    const memoScore = memo?.length ? memo.reduce((sum,m)=>sum+gradeFromMastery(m.mastery),0)/memo.length : 0;
    const present   = att?.filter(a=>a.status==='present').length || 0;
    const absent    = att?.filter(a=>a.status==='absent').length  || 0;
    const attScore  = att?.length ? (present / att.length) * 5 : 0;
    const behScore  = beh?.length ? beh.reduce((sum,b)=>sum+b.score,0)/beh.length : 0;
    const total     = memoScore + attScore + behScore;

    scored.push({ student: s, memoScore, attScore, behScore, total, present, absent, totalAtt: att?.length||0 });
  }
  scored.sort((a,b) => b.total - a.total);
  _top3AllScored = scored;
  _top3Selected  = [scored[0]||null, scored[1]||null, scored[2]||null];

  renderTop3(container);
}

function renderTop3(container) {
  if (!_top3Selected.some(x=>x)) { container.innerHTML = emptyDiv('📊','لا توجد بيانات تقييم كافية بعد'); return; }

  const periodDays = parseInt(document.getElementById('top3-period')?.value || '30');
  const periodLabel = periodDays === 0 ? 'كل الوقت' : `آخر ${periodDays} يوماً`;

  const ranks     = ['🥇 المركز الأول','🥈 المركز الثاني','🥉 المركز الثالث'];
  const podiumOrder = [1,0,2]; // عرض: ثاني، أول، ثالث

  // بطاقات المنصة
  let podiumHtml = `<div style="text-align:center;margin-bottom:14px"><span class="badge bg">📅 الفترة: ${periodLabel}</span></div>`;
  podiumHtml += '<div class="podium">';
  podiumOrder.forEach((rankIdx, pos) => {
    const t = _top3Selected[rankIdx];
    if (!t) { podiumHtml += '<div></div>'; return; }
    const photo = t.student.photo
      ? `<img src="${t.student.photo}" class="podium-photo">`
      : `<div class="podium-photo-placeholder">🧒</div>`;

    // قائمة التغيير — كل الطلاب ما عدا المختارين في مراكز أخرى
    const usedIds = _top3Selected.filter((_,i)=>i!==rankIdx).map(x=>x?.student?.id).filter(Boolean);
    const opts = _top3AllScored
      .filter(s => !usedIds.includes(s.student.id))
      .map(s => `<option value="${s.student.id}" ${s.student.id===t.student.id?'selected':''}>${s.student.full_name} (${s.total.toFixed(1)})</option>`)
      .join('');

    podiumHtml += `<div class="podium-card ${rankIdx===0?'first':''}">
      ${photo}
      <div class="podium-rank">${ranks[rankIdx]}</div>
      <div class="podium-name">${t.student.full_name}</div>
      <div class="podium-score">${t.total.toFixed(1)} / 15</div>
      <div class="score-detail">
        <span title="الحفظ">📖 ${t.memoScore.toFixed(1)}</span>
        <span title="الحضور">📅 ${t.present}/${t.totalAtt}</span>
        <span title="الغياب">❌ ${t.absent}</span>
        <span title="السلوك">🌟 ${t.behScore.toFixed(1)}</span>
      </div>
      ${CP.role==='teacher' ? `
      <div style="margin-top:10px">
        <select onchange="changeTop3('${rankIdx}',this.value)" style="width:100%;padding:6px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;border:1.5px solid var(--gray2)">
          ${opts}
        </select>
      </div>` : ''}
    </div>`;
  });
  podiumHtml += '</div>';

  // زر الإرسال (للمحفظ فقط)
  const sendBtn = CP.role==='teacher' ? `
    <div style="margin-top:20px;text-align:center">
      <button class="btn-pri" onclick="sendAllTop3WA()" style="padding:14px 40px;font-size:15px">
        📱 إرسال التهاني لأولياء الأمور
      </button>
    </div>` : '';

  container.innerHTML = podiumHtml + sendBtn;
}

function changeTop3(rankIdx, studentId) {
  const s = _top3AllScored.find(x => x.student.id === studentId);
  if (!s) return;
  _top3Selected[rankIdx] = s;
  const container = document.getElementById('top3-content');
  renderTop3(container);
}

async function sendAllTop3WA() {
  const ranks = ['المركز الأول 🥇','المركز الثاني 🥈','المركز الثالث 🥉'];
  let sent = 0, skipped = 0;
  for (let i = 0; i < _top3Selected.length; i++) {
    const t = _top3Selected[i];
    if (!t) continue;
    const { data: stu } = await sb.from('students').select('parent_phone,parent_name,full_name').eq('id', t.student.id).single();
    const phone = stu?.parent_phone;

    // تخطى إذا لا يوجد رقم هاتف
    if (!phone || phone.trim() === '') { skipped++; continue; }

    const msg = `🏆 مبروك!\n\nالسلام عليكم ورحمة الله ${stu?.parent_name ? '/ '+stu.parent_name : ''}،\n\nيسعدنا إخباركم بأن ابنكم\n*${stu?.full_name || t.student.full_name}*\nقد حصل على *${ranks[i]}*\nفي تقييم حلقته بمركز التراث لتحفيظ القرآن الكريم 📖\n\nالمجموع: ${t.total.toFixed(1)}/15\n📖 الحفظ: ${t.memoScore.toFixed(1)} | 📅 الحضور: ${t.present}/${t.totalAtt} | 🌟 السلوك: ${t.behScore.toFixed(1)}\n\nبارك الله فيه وجعله من حفاظ كتاب الله 🌟`;

    window.open(`https://wa.me/965${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    sent++;
    await new Promise(r => setTimeout(r, 800));
  }
  if (sent > 0) alert(`✅ تم فتح واتساب لإرسال ${sent} رسالة تهنئة`);
  if (skipped > 0) alert(`⚠️ ${skipped} طالب ليس لديه رقم هاتف ولي أمر مسجل`);
}

async function sendWeeklyReportWA() {
  if (!confirm('سيتم فتح واتساب لكل ولي أمر لديه رقم مسجل. هل تريد المتابعة؟')) return;

  // جلب طلاب المحفظ مع بيانات الأهالي
  const { data: circles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
  if (!circles?.length) { alert('لا توجد حلقات مرتبطة بحسابك'); return; }
  const circleIds = circles.map(c=>c.id);
  const { data: students } = await sb.from('students').select('*').in('circle_id', circleIds).order('full_name');
  if (!students?.length) { alert('لا يوجد طلاب'); return; }

  // نطاق هذا الأسبوع
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekStartStr = weekStart.toISOString().split('T')[0];
  const todayStr = new Date().toISOString().split('T')[0];

  let sent = 0, skipped = 0;
  for (const s of students) {
    if (!s.parent_phone) { skipped++; continue; }

    const { data: att }  = await sb.from('attendance').select('status').eq('student_id', s.id).gte('date', weekStartStr).lte('date', todayStr);
    const { data: memo } = await sb.from('memorization_log').select('surah_from,surah_to,verses_count,mastery').eq('student_id', s.id).gte('date', weekStartStr).lte('date', todayStr);
    const { data: beh }  = await sb.from('behavior_log').select('score').eq('student_id', s.id).gte('date', weekStartStr).lte('date', todayStr);

    const present = att?.filter(a=>a.status==='present').length||0;
    const absent  = att?.filter(a=>a.status==='absent').length||0;
    const excused = att?.filter(a=>a.status==='excused').length||0;
    const verses  = memo?.reduce((s,m)=>s+(m.verses_count||0),0)||0;
    const behAvg  = beh?.length ? (beh.reduce((s,b)=>s+b.score,0)/beh.length).toFixed(1) : '—';
    const memoSummary = memo?.length
      ? memo.map(m=>`• من ${m.surah_from} إلى ${m.surah_to} (${m.verses_count} آية) — ${m.mastery==='excellent'?'ممتاز':m.mastery==='good'?'جيد':m.mastery==='needs_review'?'يحتاج مراجعة':'ضعيف'}`).join('\n')
      : '• لم يُسجَّل حفظ هذا الأسبوع';

    const msg =
`السلام عليكم ورحمة الله وبركاته 🌿
${s.parent_name ? `/ ${s.parent_name}` : ''}

تقرير أسبوعي لابنكم
*${s.full_name}*
من مركز التراث لتحفيظ القرآن الكريم 📖

━━━━━━━━━━━━━━━
📅 *الحضور هذا الأسبوع:*
✅ حاضر: ${present} | ❌ غائب: ${absent} | 〰️ بعذر: ${excused}

📖 *الحفظ:*
${memoSummary}
إجمالي الآيات: ${verses} آية

🌟 *السلوك:* ${behAvg}/5
━━━━━━━━━━━━━━━

بارك الله في ابنكم وجعله من حفاظ كتاب الله 🤲`;

    const url = `https://wa.me/965${s.parent_phone}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
    sent++;
    await new Promise(r => setTimeout(r, 1000));
  }

  alert(`✅ تم فتح واتساب لـ ${sent} ولي أمر${skipped>0?`\n⚠️ ${skipped} طالب بدون رقم ولي أمر مسجل`:''}`);
}

async function loadSupHome() {
  const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
  const c = document.getElementById('sup-content');
  if (!links?.length) { c.innerHTML = emptyDiv('🧑‍💼','لم يتم تعيينك على أي حلقة بعد.'); return; }

  c.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ تحميل البيانات...</p></div>';

  const circleIds = links.map(l => l.circle_id);
  const { data: circles } = await sb.from('circles').select('id,name,schedule,location,teacher_name').in('id', circleIds);

  // جمع إحصائيات كل حلقة
  const circleStats = [];
  for (const circle of (circles||[])) {
    const { data: students } = await sb.from('students').select('id').eq('circle_id', circle.id);
    const studentIds = students?.map(s=>s.id) || [];
    const count = studentIds.length;

    let attRate = 0, memoAvg = 0, behAvg = 0;
    if (count > 0) {
      const { data: att } = await sb.from('attendance').select('status').in('student_id', studentIds);
      const { data: memo } = await sb.from('memorization_log').select('mastery').in('student_id', studentIds);
      const { data: beh } = await sb.from('behavior_log').select('score').in('student_id', studentIds);

      attRate = att?.length ? Math.round(att.filter(a=>a.status==='present').length / att.length * 100) : 0;
      memoAvg = memo?.length ? (memo.reduce((s,m)=>s+gradeFromMastery(m.mastery),0)/memo.length).toFixed(1) : 0;
      behAvg  = beh?.length  ? (beh.reduce((s,b)=>s+b.score,0)/beh.length).toFixed(1) : 0;
    }
    circleStats.push({ circle, count, attRate, memoAvg, behAvg });

    <div class="sc" style="border-color:#14568f"><div class="si" style="background:#e0eefb">📅</div><div><div class="sn">${avgAtt}%</div><div class="sl">متوسط الحضور</div></div></div>
    ${bestAttCircle  ? `<div class="sc" style="border-color:#1d6b3a"><div class="si" style="background:#e3f3e8">🏆</div><div><div class="sn" style="font-size:13px">${bestAttCircle.circle.name}</div><div class="sl">أعلى حضور (${bestAttCircle.attRate}%)</div></div></div>` : ''}
    ${bestMemoCircle ? `<div class="sc" style="border-color:#c9a153"><div class="si" style="background:#fdf1d9">📖</div><div><div class="sn" style="font-size:13px">${bestMemoCircle.circle.name}</div><div class="sl">أعلى حفظ (${bestMemoCircle.memoAvg}/5)</div></div></div>` : ''}

  <!-- جدول المقارنة -->
  <div class="card" style="margin-bottom:20px">
    <div class="ch"><h3>📊 مقارنة الحلقات</h3></div>
    <div class="cb">
      <div class="tw">
        <table>
          <thead>
            <tr>
              <th>الحلقة</th>
              <th>المحفظ</th>
              <th>الطلاب</th>
              <th>نسبة الحضور</th>
              <th>متوسط الحفظ</th>
              <th>متوسط السلوك</th>
              <th>التقييم الكلي</th>
            </tr>
          </thead>
          <tbody>
            ${circleStats.map((s,i) => {
              const total = ((s.attRate/100)*5 + parseFloat(s.memoAvg||0) + parseFloat(s.behAvg||0)).toFixed(1);
              const attColor = s.attRate>=80?'be':s.attRate>=60?'br':'bw';
              const rank = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
              return `<tr>
                <td><strong>${rank} ${s.circle.name}</strong></td>
                <td>${s.circle.teacher_name||'—'}</td>
                <td><strong>${s.count}</strong></td>
                <td>
                  <span class="badge ${attColor}">${s.attRate}%</span>
                  <div class="sb" style="margin-top:4px;width:80px"><div class="sf" style="width:${s.attRate}%"></div></div>

        </table>
      </div>

  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap">

let editingDonorId = null;

async function loadDonors() {
  const { data: donors } = await sb.from('donors').select('*').order('full_name');
  const { data: links } = await sb.from('donor_circles').select('donor_id, circles(id,name)');

  const circlesByDonor = {};
  links?.forEach(l => {
    if (!circlesByDonor[l.donor_id]) circlesByDonor[l.donor_id] = [];
    circlesByDonor[l.donor_id].push(l.circles);
  });

  const b = document.getElementById('donors-body');
  if (!donors?.length) { b.innerHTML = emptyRow(5,'لا يوجد متبرعون بعد'); return; }

  b.innerHTML = donors.map((d,i) => {
    const circles = circlesByDonor[d.id] || [];
    const circleNames = circles.map(c=>c?.name).filter(Boolean).join('، ') || '—';
    return `<tr>
      <td style="color:var(--mid);font-weight:700">${i+1}</td>
      <td><strong>${d.full_name}</strong>${d.notes?`<br><small style="color:var(--mid)">${d.notes}</small>`:''}</td>
      <td>${d.phone||'—'}</td>
      <td><span style="font-size:12px">${circleNames}</span></td>
      <td>
        <button class="btn btn-g btn-sm" onclick="showDonorReport('${d.id}','${esc(d.full_name)}','${d.phone||''}')">📋 تقرير</button>
        <button class="btn btn-o btn-sm" onclick="editDonor('${d.id}')">✏️</button>
        <button class="btn btn-r btn-sm" onclick="delDonor('${d.id}')">حذف</button>
      </td></tr>`;
  }).join('');
}

async function openAddDonor() {
  editingDonorId = null;
  document.getElementById('donor-modal-title').textContent = 'إضافة متبرع';
  document.getElementById('donor-name').value = '';
  document.getElementById('donor-phone').value = '';
  document.getElementById('donor-notes').value = '';
  await loadDonorCirclesChecks([]);
  openM('m-donor');
}

async function editDonor(id) {
  const { data: d } = await sb.from('donors').select('*').eq('id', id).single();
  const { data: links } = await sb.from('donor_circles').select('circle_id').eq('donor_id', id);
  editingDonorId = id;
  document.getElementById('donor-modal-title').textContent = 'تعديل بيانات المتبرع';
  document.getElementById('donor-name').value = d.full_name || '';
  document.getElementById('donor-phone').value = d.phone || '';
  document.getElementById('donor-notes').value = d.notes || '';
  const checkedIds = links?.map(l => l.circle_id) || [];
  await loadDonorCirclesChecks(checkedIds);
  openM('m-donor');
}

async function loadDonorCirclesChecks(checkedIds=[]) {
  const { data: circles } = await sb.from('circles').select('id,name').order('name');
  const container = document.getElementById('donor-circles-checks');
  container.innerHTML = circles?.map(c => `
    <label style="display:flex;align-items:center;gap:8px;padding:6px;cursor:pointer;border-radius:6px;margin-bottom:3px;background:${checkedIds.includes(c.id)?'#e8f5e9':'transparent'}">
      <input type="checkbox" value="${c.id}" ${checkedIds.includes(c.id)?'checked':''}
        onchange="this.closest('label').style.background=this.checked?'#e8f5e9':'transparent'">
      <span style="font-size:13px">${c.name}</span>
    </label>`).join('') || '';
}

async function saveDonor() {
  const name = v('donor-name'), phone = v('donor-phone'), notes = v('donor-notes');
  if (!name) { showAlert('donor-alert','أدخل اسم المتبرع','err'); return; }
  const circleIds = Array.from(document.querySelectorAll('#donor-circles-checks input:checked')).map(i=>i.value);

  if (editingDonorId) {
    await sb.from('donors').update({ full_name: name, phone, notes }).eq('id', editingDonorId);
    await sb.from('donor_circles').delete().eq('donor_id', editingDonorId);
    if (circleIds.length) await sb.from('donor_circles').insert(circleIds.map(cid=>({ donor_id: editingDonorId, circle_id: cid })));
    editingDonorId = null;
  } else {
    const { data: nd } = await sb.from('donors').insert({ full_name: name, phone, notes }).select().single();
    if (nd && circleIds.length) await sb.from('donor_circles').insert(circleIds.map(cid=>({ donor_id: nd.id, circle_id: cid })));
  }
  closeM('m-donor');
  loadDonors();
}

async function delDonor(id) {
  if (!confirm('حذف هذا المتبرع؟')) return;
  await sb.from('donors').delete().eq('id', id);
  loadDonors();
}
