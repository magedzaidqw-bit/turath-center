async function showDonorReport(donorId, donorName, donorPhone) {
  // تخزين بيانات المتبرع الحالي
  _currentDonor = { id: donorId, name: donorName, phone: donorPhone };

  // ضبط الشهر الافتراضي (الشهر السابق)
  const now = new Date();
  const defaultMonth = now.getMonth() === 0 ? 12 : now.getMonth();
  const defaultYear  = now.getMonth() === 0 ? now.getFullYear()-1 : now.getFullYear();
  const mSel = document.getElementById('donor-report-month');
  const ySel = document.getElementById('donor-report-year');
  if (mSel && !mSel._set) { mSel.value = defaultMonth; mSel._set = true; }
  if (ySel && !ySel._set) { ySel.value = defaultYear;  ySel._set = true; }
  const body = document.getElementById('donor-report-body');
  document.getElementById('donor-report-title').textContent = `تقرير المتبرع: ${donorName}`;
  body.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ تحميل البيانات...</p></div>';
  openM('m-donor-report');

  const { data: links } = await sb.from('donor_circles').select('circle_id, circles(id,name,teacher_name)').eq('donor_id', donorId);
  if (!links?.length) { body.innerHTML = emptyDiv('🕌','لا توجد حلقات مرتبطة بهذا المتبرع'); return; }

  let totalStudents=0, totalVerses=0, totalPresent=0, totalAbsent=0, totalExcused=0;
  let allMemo=[], allBeh=[];
  const circlesData=[];

  // الشهر المختار
  const selMonth = parseInt(document.getElementById('donor-report-month')?.value || new Date().getMonth());
  const selYear  = parseInt(document.getElementById('donor-report-year')?.value  || new Date().getFullYear());
  const monthStart = `${selYear}-${String(selMonth).padStart(2,'0')}-01`;
  const monthEnd   = new Date(selYear, selMonth, 0).toISOString().split('T')[0];

  // آخر 6 أشهر للرسم البياني
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(selYear, selMonth-1-i, 1);
    months.push({label:d.toLocaleDateString('ar-KW',{month:'short',year:'2-digit'}),
      start:new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0],
      end:new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split('T')[0]});
  }

  for(const link of links){
    const circle=link.circles; if(!circle) continue;
    const {data:students}=await sb.from('students').select('id,full_name').eq('circle_id',circle.id).order('full_name');
    const studentIds=students?.map(s=>s.id)||[];
    totalStudents+=studentIds.length;
    let memoData=[],behData=[],attData2=[];
    if(studentIds.length){
      const [m,b,a]=await Promise.all([
        sb.from('memorization_log').select('student_id,surah_from,surah_to,verses_count,mastery,date').in('student_id',studentIds).gte('date',monthStart).lte('date',monthEnd).order('date',{ascending:false}),
        sb.from('behavior_log').select('student_id,score,date').in('student_id',studentIds).gte('date',monthStart).lte('date',monthEnd),
        sb.from('attendance').select('student_id,status,date').in('student_id',studentIds).gte('date',monthStart).lte('date',monthEnd)
      ]);
      memoData=m.data||[]; behData=b.data||[]; attData2=a.data||[];
    }
    const verses=memoData.reduce((s,m)=>s+(m.verses_count||0),0);
    const present=attData2.filter(a=>a.status==='present').length;
    const absent=attData2.filter(a=>a.status==='absent').length;
    const excused=attData2.filter(a=>a.status==='excused').length;
    totalVerses+=verses; totalPresent+=present; totalAbsent+=absent; totalExcused+=excused;
    allMemo=[...allMemo,...memoData]; allBeh=[...allBeh,...behData];
    circlesData.push({circle,students,memoData,behData,attData2,verses,present,absent,excused});
  }

  const totalAtt=totalPresent+totalAbsent+totalExcused;
  const attRate=totalAtt?Math.round(totalPresent/totalAtt*100):0;
  const behAvg=allBeh.length?(allBeh.reduce((s,b)=>s+b.score,0)/allBeh.length).toFixed(1):'—';
  const monthlyVerses=months.map(m=>allMemo.filter(r=>r.date>=m.start&&r.date<=m.end).reduce((s,r)=>s+(r.verses_count||0),0));
  const masteryCount={
    excellent:allMemo.filter(m=>m.mastery==='excellent').length,
    good:allMemo.filter(m=>m.mastery==='good').length,
    needs_review:allMemo.filter(m=>m.mastery==='needs_review').length,
    weak:allMemo.filter(m=>m.mastery==='weak').length
  };

  const monthName = new Date(selYear, selMonth-1, 1).toLocaleDateString('ar-KW',{month:'long',year:'numeric'});
  document.getElementById('donor-report-title').textContent = `تقرير المتبرع: ${donorName} — ${monthName}`;

  let html=`
  <div style="background:linear-gradient(135deg,var(--gd),#1f5c38);border-radius:18px;padding:24px;color:white;text-align:center;margin-bottom:20px">
    <div style="font-size:32px;margin-bottom:8px">💚</div>
    <div style="font-family:'Amiri',serif;font-size:18px;color:var(--gold3);margin-bottom:12px;font-weight:700">بفضل تبرعكم الكريم — ${monthName}</div>
    <div style="font-size:17px;line-height:2;font-weight:600">
      استفاد <strong style="color:white;font-size:26px;background:rgba(255,255,255,0.15);padding:2px 12px;border-radius:8px">${totalStudents}</strong> طالباً من حلقاتكم المكفولة
      <br>
      وحفظوا <strong style="color:white;font-size:26px;background:rgba(255,255,255,0.15);padding:2px 12px;border-radius:8px">${totalVerses.toLocaleString()}</strong> آية من كتاب الله
    </div>
  </div>
  <div class="sgrid" style="margin-bottom:20px">
    <div class="sc"><div class="si">🎓</div><div><div class="sn">${totalStudents}</div><div class="sl">طالب مستفيد</div></div></div>
    <div class="sc" style="border-color:#1d6b3a"><div class="si" style="background:#e3f3e8">📅</div><div><div class="sn">${attRate}%</div><div class="sl">نسبة الحضور</div></div></div>
    <div class="sc" style="border-color:#14568f"><div class="si" style="background:#e0eefb">📖</div><div><div class="sn">${totalVerses.toLocaleString()}</div><div class="sl">آية محفوظة</div></div></div>
    <div class="sc" style="border-color:var(--gold)"><div class="si" style="background:#fdf1d9">🌟</div><div><div class="sn">${behAvg}</div><div class="sl">متوسط السلوك /5</div></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div class="card"><div class="ch"><h3>📅 الحضور والغياب</h3></div>
      <div class="cb" style="display:flex;align-items:center;justify-content:center"><canvas id="chart-att" width="200" height="200"></canvas></div>
      <div style="padding:0 16px 16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <span class="badge be">✓ ${totalPresent}</span><span class="badge ba">✗ ${totalAbsent}</span><span class="badge bex">~ ${totalExcused}</span>
      </div>
    </div>
    <div class="card"><div class="ch"><h3>📖 مستوى الإتقان</h3></div>
      <div class="cb" style="display:flex;align-items:center;justify-content:center"><canvas id="chart-mastery" width="200" height="200"></canvas></div>
      <div style="padding:0 16px 16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;font-size:11px">
        <span class="badge be">ممتاز:${masteryCount.excellent}</span><span class="badge bg">جيد:${masteryCount.good}</span>
        <span class="badge br">يراجع:${masteryCount.needs_review}</span><span class="badge bw">ضعيف:${masteryCount.weak}</span>
      </div>
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div class="ch"><h3>📈 تطور الحفظ — آخر 6 أشهر</h3></div>
    <div class="cb"><canvas id="chart-monthly" height="110"></canvas></div>
  </div>
  <h4 style="font-size:15px;font-weight:700;color:var(--gd);margin-bottom:14px">🕌 تفاصيل الحلقات</h4>`;

  for(const cd of circlesData){
    const {circle,students,memoData,behData,attData2,verses,present,absent}=cd;
    const sAttRate=(present+absent+cd.excused)?Math.round(present/(present+absent+cd.excused)*100):0;
    const sBehAvg=behData.length?(behData.reduce((s,b)=>s+b.score,0)/behData.length).toFixed(1):'—';
    const attColor=sAttRate>=80?'be':sAttRate>=60?'br':'bw';
    const studentsRows=(students||[]).map(s=>{
      const sMemo=memoData.filter(m=>m.student_id===s.id);
      const sBeh=behData.filter(b=>b.student_id===s.id);
      const sAtt=attData2.filter(a=>a.student_id===s.id);
      const sPresent=sAtt.filter(a=>a.status==='present').length;
      const sAbsent=sAtt.filter(a=>a.status==='absent').length;
      const sVerses=sMemo.reduce((t,m)=>t+(m.verses_count||0),0);
      const sSBehAvg=sBeh.length?(sBeh.reduce((t,b)=>t+b.score,0)/sBeh.length).toFixed(1):'—';
      const sRate=(sPresent+sAbsent)?Math.round(sPresent/(sPresent+sAbsent)*100):0;
      const sc=sRate>=80?'be':sRate>=60?'br':'bw';
      return `<tr><td><strong>${s.full_name}</strong></td><td><span class="badge ${sc}">${sRate}%</span> (${sPresent}✓ ${sAbsent}✗)</td><td>${sVerses} آية (${sMemo.length} جلسة)</td><td>${sSBehAvg}/5</td></tr>`;
    }).join('');
    html+=`<div class="report-card" style="margin-bottom:16px">
      <div class="report-card-head"><h3>🕌 ${circle.name}</h3><span style="color:var(--gold3);font-size:13px">المحفظ: ${circle.teacher_name||'—'} | <span class="badge ${attColor}">${sAttRate}% حضور</span></span></div>
      <div class="report-section">
        <div class="stat-row">
          <div class="stat-box"><div class="num">${students?.length||0}</div><div class="lbl">طالب</div></div>
          <div class="stat-box"><div class="num">${sAttRate}%</div><div class="lbl">الحضور</div></div>
          <div class="stat-box"><div class="num">${present}</div><div class="lbl">حاضر</div></div>
          <div class="stat-box"><div class="num">${absent}</div><div class="lbl">غائب</div></div>
          <div class="stat-box"><div class="num">${verses}</div><div class="lbl">آية</div></div>
          <div class="stat-box"><div class="num">${sBehAvg}</div><div class="lbl">السلوك</div></div>
        </div>
        <div class="tw"><table><thead><tr><th>الطالب</th><th>الحضور</th><th>الحفظ</th><th>السلوك</th></tr></thead>
        <tbody>${studentsRows||emptyRow(4,'لا يوجد طلاب')}</tbody></table></div>
      </div>
    </div>`;
  }

  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;justify-content:center">
    <button class="btn-pri" id="donor-wa-btn" style="background:linear-gradient(135deg,#25D366,#128C7E);padding:12px 28px" onclick="window._donorWA()">📱 إرسال واتساب</button>
    <button class="btn btn-o" style="padding:12px 28px" onclick="window._donorPrint()">🖨️ طباعة / حفظ PDF</button>
  </div>`;

  body.innerHTML=html;

  // تخزين بيانات المتبرع للاستخدام في الأزرار
  window._donorWA = donorPhone ? () => sendDonorReportWA(donorName, donorPhone) : () => alert('لا يوجد رقم هاتف لهذا المتبرع');
  window._donorPrint = () => printDonorReport(donorName);
  // إخفاء زر واتساب إذا لا يوجد رقم
  if (!donorPhone) { const wb = document.getElementById('donor-wa-btn'); if(wb) wb.style.display='none'; }

  setTimeout(()=>{
    const attCtx=document.getElementById('chart-att')?.getContext('2d');
    if(attCtx&&totalAtt>0) new Chart(attCtx,{type:'doughnut',data:{labels:['حاضر','غائب','بعذر'],datasets:[{data:[totalPresent,totalAbsent,totalExcused],backgroundColor:['#1d6b3a','#a3262b','#a66a0c'],borderWidth:2}]},options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Cairo',size:11}}}},cutout:'65%'}});
    const mastCtx=document.getElementById('chart-mastery')?.getContext('2d');
    if(mastCtx&&allMemo.length>0) new Chart(mastCtx,{type:'doughnut',data:{labels:['ممتاز','جيد','يحتاج مراجعة','ضعيف'],datasets:[{data:[masteryCount.excellent,masteryCount.good,masteryCount.needs_review,masteryCount.weak],backgroundColor:['#1d6b3a','#14568f','#a66a0c','#a3262b'],borderWidth:2}]},options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Cairo',size:11}}}},cutout:'65%'}});
    const monCtx=document.getElementById('chart-monthly')?.getContext('2d');
    if(monCtx) new Chart(monCtx,{type:'bar',data:{labels:months.map(m=>m.label),datasets:[{label:'آيات محفوظة',data:monthlyVerses,backgroundColor:'rgba(26,82,48,0.75)',borderColor:'#1a5230',borderWidth:2,borderRadius:6}]},options:{plugins:{legend:{labels:{font:{family:'Cairo'}}}},scales:{y:{beginAtZero:true,ticks:{font:{family:'Cairo'}}},x:{ticks:{font:{family:'Cairo'}}}}}});
  },200);
}

async function downloadDonorPDF(donorName) {
  const content = document.getElementById('donor-report-body');
  if (!content) return;

  const btn = event.target;
  btn.textContent = '⏳ جارٍ التحضير...';
  btn.disabled = true;

  // إنشاء عنصر مؤقت للطباعة
  const printEl = document.createElement('div');
  printEl.style.cssText = 'direction:rtl;font-family:Arial,sans-serif;padding:20px;color:#000;background:#fff';
  printEl.innerHTML = `
    <div style="text-align:center;margin-bottom:20px;border-bottom:3px solid #0a1e12;padding-bottom:14px">
      <div style="font-size:18px;font-weight:900;color:#0a1e12;margin-bottom:4px">مركز التراث لتحفيظ القرآن الكريم</div>
      <div style="font-size:13px;color:#3d7a4a;font-weight:700">فرع الجهراء</div>
    </div>
    <h2 style="text-align:center;font-size:16px;color:#0a1e12;margin:12px 0 4px">تقرير المتبرع: ${donorName}</h2>
    <p style="text-align:center;font-size:11px;color:#888;margin-bottom:16px">تاريخ التقرير: ${new Date().toLocaleDateString('ar-KW')}</p>
    ${content.innerHTML}
    <div style="margin-top:20px;text-align:center;font-size:12px;color:#555;border-top:2px solid #0a1e12;padding-top:10px;font-weight:700">
      رسالتنا تبدأ بالحرف وتمتد للأجيال
    </div>`;

  // إزالة الأزرار من PDF
  printEl.querySelectorAll('button').forEach(b => b.remove());

  document.body.appendChild(printEl);

  const opt = {
    margin: [10, 10, 10, 10],
    filename: `تقرير_${donorName}_${new Date().toLocaleDateString('ar-KW').replace(/\//g,'-')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, rtl: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  try {
    await html2pdf().set(opt).from(printEl).save();
  } catch(e) {
    alert('تعذر إنشاء PDF — جرب زر الطباعة بدلاً من ذلك');
  }

  document.body.removeChild(printEl);
  btn.textContent = '⬇️ تحميل PDF';
  btn.disabled = false;
}

let notifInterval = null;

async function loadNotifications() {
  if (!CU || !['admin','supervisor'].includes(CP?.role)) return;
  const bell = document.getElementById('notif-bell-btn');
  if (bell) bell.style.display = 'block';

  const { data } = await sb.from('notifications')
    .select('*,from_user:profiles!notifications_from_user_id_fkey(full_name)')
    .eq('to_user_id', CU.id)
    .order('created_at', {ascending: false})
    .limit(20);

  const unread = (data||[]).filter(n => !n.is_read).length;
  const badge = document.getElementById('notif-badge');
  if (badge) {
    badge.textContent = unread;
    badge.classList.toggle('hidden', unread === 0);
  }

  const list = document.getElementById('notif-list');
  if (!list) return;
  if (!data?.length) {
    list.innerHTML = '<div class="empty" style="padding:30px"><div class="ei">🔔</div><p>لا توجد إشعارات</p></div>';
    return;
  }
  list.innerHTML = data.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="openNotif('${n.id}','${n.related_id||''}')">
      <div class="notif-icon">${n.type === 'monthly_report' ? '📋' : '🔔'}</div>
      <div class="notif-text">
        <div class="notif-title">${n.title}</div>
        <div class="notif-body-text">${n.body}</div>
        <div class="notif-time">${formatTime(n.created_at)} · ${n.from_user?.full_name||'النظام'}</div>
      </div>
    </div>`).join('');
}

function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) loadNotifications();
}

document.addEventListener('click', function(e) {
  const panel = document.getElementById('notif-panel');
  const bell = document.getElementById('notif-bell-btn');
  if (panel?.classList.contains('open') && !panel.contains(e.target) && e.target !== bell && !bell?.contains(e.target)) {
    panel.classList.remove('open');
  }
});

async function openNotif(notifId, reportId) {
  await sb.from('notifications').update({is_read: true}).eq('id', notifId);
  loadNotifications();
  if (reportId) {
    const { data: report } = await sb.from('monthly_reports').select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name)').eq('id', reportId).single();
    if (report) showReportModal(report);
  }
  document.getElementById('notif-panel').classList.remove('open');
}

async function markAllRead() {
  await sb.from('notifications').update({is_read: true}).eq('to_user_id', CU.id).eq('is_read', false);
  loadNotifications();
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('ar-KW') + ' ' + d.toLocaleTimeString('ar-KW', {hour:'2-digit',minute:'2-digit'});
}

async function sendNotification(toUserId, title, body, type, relatedId) {
  try {
    await sb.from('notifications').insert({
      to_user_id: toUserId, from_user_id: CU.id,
      type, title, body, related_id: relatedId
    });
  } catch(e) { console.error('notif error:', e); }
}

// ===================== MONTHLY REPORT =====================
const MONTHS_AR = ['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function initMonthlyReport() {
  const now = new Date();
  const prevMonth = now.getMonth() === 0 ? 12 : now.getMonth();
  const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
  const mSel = document.getElementById('report-month');
  const ySel = document.getElementById('report-year');
  if (mSel) mSel.value = prevMonth;
  if (ySel) ySel.value = prevYear;
  document.getElementById('report-preview').innerHTML = `
    <div class="empty"><div class="ei">📋</div><p>اختر الشهر والسنة ثم اضغط "توليد التقرير"</p></div>`;
}

async function generateMonthlyReport() {
  const month = parseInt(document.getElementById('report-month').value);
  const year = parseInt(document.getElementById('report-year').value);
  const preview = document.getElementById('report-preview');
  preview.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ جمع البيانات...</p></div>';

  // جلب حلقات المحفظ
  const { data: circles } = await sb.from('circles').select('id,name').eq('teacher_id', CU.id);
  if (!circles?.length) { preview.innerHTML = emptyDiv('🕌','لم يتم تعيينك في حلقة'); return; }

  const circleIds = circles.map(c => c.id);
  const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
  const endDate = `${year}-${String(month).padStart(2,'0')}-31`;

  // جمع البيانات - أولاً الطلاب ثم باقي البيانات
  const { data: students } = await sb.from('students').select('id,full_name').in('circle_id', circleIds).order('full_name');
  const studentIds = students?.map(s=>s.id) || [];

  if (!students?.length) { preview.innerHTML = emptyDiv('🎓','لا يوجد طلاب في حلقاتك'); return; }

  const [attRes, memoRes, behRes] = await Promise.all([
    sb.from('attendance').select('student_id,status').in('circle_id', circleIds).gte('date', startDate).lte('date', endDate),
    studentIds.length ? sb.from('memorization_log').select('student_id,mastery,verses_count').in('student_id', studentIds).gte('date', startDate).lte('date', endDate) : {data:[]},
    studentIds.length ? sb.from('behavior_log').select('student_id,score').in('student_id', studentIds).gte('date', startDate).lte('date', endDate) : {data:[]}
  ]);

  const att = attRes.data || [];
  const memo = memoRes.data || [];
  const review = [];
  const beh = behRes.data || [];

  // بناء بيانات كل طالب
  const studentData = students.map(s => {
    const sAtt = att.filter(a => a.student_id === s.id);
    const sMemo = memo.filter(m => m.student_id === s.id);
    const sReview = review.filter(r => r.student_id === s.id);
    const sBeh = beh.filter(b => b.student_id === s.id);
    return {
      id: s.id, name: s.full_name,
      present: sAtt.filter(a => a.status === 'present').length,
      absent: sAtt.filter(a => a.status === 'absent').length,
      excused: sAtt.filter(a => a.status === 'excused').length,
      totalAtt: sAtt.length,
      memoSessions: sMemo.length,
      memoVerses: sMemo.reduce((s,m) => s + (m.verses_count||0), 0),
      memoMastery: sMemo.length ? sMemo.reduce((s,m) => s + (m.mastery==='excellent'?5:m.mastery==='good'?4:m.mastery==='needs_review'?2:1), 0)/sMemo.length : 0,
      reviewSessions: sReview.length,
      reviewVerses: sReview.reduce((s,r) => s + (r.verses_count||0), 0),
      behSessions: sBeh.length,
      behAvg: sBeh.length ? (sBeh.reduce((s,b) => s + b.score, 0) / sBeh.length).toFixed(1) : '—'
    };
  });

  // ملخص إجمالي
  const totalPresent = att.filter(a => a.status === 'present').length;
  const totalAbsent = att.filter(a => a.status === 'absent').length;
  const totalMemoSessions = memo.length;
  const totalMemoVerses = memo.reduce((s,m) => s + (m.verses_count||0), 0);
  const totalReviewSessions = review.length;

  const reportData = { students: studentData, totals: { totalPresent, totalAbsent, totalMemoSessions, totalMemoVerses, totalReviewSessions }, circles: circles.map(c=>c.name).join('، ') };

  // حفظ أو تحديث في قاعدة البيانات
  const { data: existing } = await sb.from('monthly_reports')
    .select('id').eq('teacher_id', CU.id).eq('month', month).eq('year', year).maybeSingle();

  let reportId;
  if (existing) {
    await sb.from('monthly_reports').update({ report_data: reportData, status: 'draft', submitted_at: null }).eq('id', existing.id);
    reportId = existing.id;
  } else {
    const { data: ins } = await sb.from('monthly_reports').insert({
      teacher_id: CU.id, month, year,
      circle_id: circleIds[0], report_data: reportData, status: 'draft'
    }).select().single();
    reportId = ins?.id;
  }

  renderReportPreview(reportData, month, year, reportId, 'draft');
}

          <div class="stat-box"><div class="num">${data.totals.totalReviewSessions}</div><div class="lbl">جلسات المراجعة</div></div>
        </div>
      </div>
      <div class="report-section">

        <textarea id="teacher-notes-input" rows="4" style="width:100%;padding:12px;border:1.5px solid var(--gray2);border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;resize:vertical"
          placeholder="أضف ملاحظاتك وتوصياتك هنا...">${data.teacherNotes||''}</textarea>

      ${status !== 'submitted' ? `

        <button class="btn-pri" onclick="submitMonthlyReport('${reportId}',${month},${year})" style="width:auto;padding:12px 32px">
          📤 إرسال التقرير للمشرف
        </button>
      </div>` : `<div class="report-section" style="background:#e3f3e8;border-radius:0 0 18px 18px;text-align:center;color:#1d6b3a;font-weight:700">✅ تم إرسال هذا التقرير للمشرف بنجاح</div>`}
    </div>`;
}

async function submitMonthlyReport(reportId, month, year) {
  const notes = document.getElementById('teacher-notes-input')?.value || '';

  // تحديث التقرير في DB
  const { data: report } = await sb.from('monthly_reports')
    .update({ teacher_notes: notes, status: 'submitted', submitted_at: new Date().toISOString() })
    .eq('id', reportId)
    .select('*').single();

  // إرسال إشعارات للمشرفين والمدير
  const { data: myCircles } = await sb.from('circles').select('id').eq('teacher_id', CU.id);
  const circleIds = myCircles?.map(c => c.id) || [];

  // المشرفون المرتبطون بهذه الحلقات
  if (circleIds.length) {
    const { data: supLinks } = await sb.from('supervisor_circles').select('supervisor_id').in('circle_id', circleIds);
    const supIds = [...new Set((supLinks||[]).map(l => l.supervisor_id))];
    for (const sid of supIds) {
      await sendNotification(sid,
        `📋 تقرير شهري جديد — ${MONTHS_AR[month]} ${year}`,
        `رفع ${CP.full_name} التقرير الشهري لشهر ${MONTHS_AR[month]} ${year}`,
        'monthly_report', reportId);
    }
  }

  // المدير
  const { data: admins } = await sb.from('profiles').select('id').eq('role','admin');
  for (const a of (admins||[])) {
    await sendNotification(a.id,
      `📋 تقرير شهري جديد — ${MONTHS_AR[month]} ${year}`,
      `رفع ${CP.full_name} التقرير الشهري لشهر ${MONTHS_AR[month]} ${year}`,
      'monthly_report', reportId);
  }

  alert(`✅ تم إرسال التقرير للمشرف والمدير`);
  if (report) renderReportPreview({ ...report.report_data, teacherNotes: notes }, month, year, reportId, 'submitted');
}

function initReportsView() {
  const now = new Date();
  const prevMonth = now.getMonth() === 0 ? 12 : now.getMonth();
  const prevYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
  const mSel = document.getElementById('view-report-month');
  const ySel = document.getElementById('view-report-year');
  if (mSel) mSel.value = prevMonth;
  if (ySel) ySel.value = prevYear;
  loadReportsView();
}

async function loadReportsView() {
  const month = parseInt(document.getElementById('view-report-month')?.value);
  const year = parseInt(document.getElementById('view-report-year')?.value);
  const list = document.getElementById('reports-list');
  list.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>جارٍ التحميل...</p></div>';

  let q = sb.from('monthly_reports')
    .select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name)')
    .eq('month', month).eq('year', year)
    .order('submitted_at', {ascending: false, nullsFirst: false});

  // المشرف يرى فقط تقارير محفظي حلقاته
  if (CP.role === 'supervisor') {
    const { data: links } = await sb.from('supervisor_circles').select('circle_id').eq('supervisor_id', CU.id);
    const circleIds = links?.map(l => l.circle_id) || [];
    if (circleIds.length) {
      const { data: circles } = await sb.from('circles').select('teacher_id').in('id', circleIds);
      const teacherIds = [...new Set(circles?.map(c => c.teacher_id).filter(Boolean))];
      if (teacherIds.length) q = q.in('teacher_id', teacherIds);
    }
  }

  const { data: reports } = await q;

  if (!reports?.length) {
    list.innerHTML = emptyDiv('📋', `لا توجد تقارير مرفوعة لشهر ${MONTHS_AR[month]} ${year}`);
    return;
  }

  list.innerHTML = reports.map(r => {
    const d = r.report_data || {};
    const statusBadge = r.status === 'submitted'
      ? '<span class="report-status-submitted">✅ مُرسَل</span>'
      : '<span class="report-status-draft">📝 مسودة</span>';
    const submittedDate = r.submitted_at ? `<span style="font-size:12px;color:var(--mid)">أُرسل في: ${formatTime(r.submitted_at)}</span>` : '';
    return `
      <div class="report-card">
        <div class="report-card-head">
          <div>
            <h3>👨‍🏫 ${r.teacher?.full_name || '—'}</h3>
            ${submittedDate}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${statusBadge}
            <button class="btn btn-g btn-sm" onclick="showFullReport('${r.id}')">عرض التفاصيل</button>
            <button class="btn btn-o btn-sm" onclick="printMonthlyReport('${r.id}','${r.teacher?.full_name||''}',${r.month},${r.year})">🖨️ طباعة</button>
          </div>
        </div>
        <div class="report-section">
          <div class="stat-row">
            <div class="stat-box"><div class="num">${d.students?.length||0}</div><div class="lbl">الطلاب</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalPresent||0}</div><div class="lbl">حضور</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalAbsent||0}</div><div class="lbl">غياب</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalMemoVerses||0}</div><div class="lbl">آية محفوظة</div></div>
            <div class="stat-box"><div class="num">${d.totals?.totalReviewSessions||0}</div><div class="lbl">مراجعة</div></div>
          </div>
          ${r.teacher_notes ? `<div style="margin-top:12px;padding:12px;background:var(--gray);border-radius:10px;font-size:13px;border-right:3px solid var(--gold)"><strong>ملاحظات المحفظ:</strong><br>${r.teacher_notes}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function printMonthlyReport(reportId, teacherName, month, year) {
  const { data: r } = await sb.from('monthly_reports')
    .select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name)')
    .eq('id', reportId).single();
  if (!r) return;

  const d = r.report_data || {};
  const monthName = MONTHS_AR[month] || '';

  const studentsRows = (d.students||[]).map((s,i) => `
    <tr style="background:${i%2===0?'#f5f5f5':'white'}">
      <td style="padding:8px 10px;font-size:11px">${i+1}</td>
      <td style="padding:8px 10px;font-size:11px;font-weight:600">${s.name}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.present||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.absent||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.memoSessions||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.memoVerses||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.reviewSessions||0}</td>
      <td style="padding:8px 10px;text-align:center;font-size:11px">${s.behAvg||'—'}</td>
    </tr>`).join('');

  document.getElementById('print-title').textContent = 
    `التقرير الشهري — ${teacherName} — ${monthName} ${year} — مركز التراث لتحفيظ القرآن الكريم — فرع الجهراء`;
  document.getElementById('print-date').textContent = `تاريخ الطباعة: ${new Date().toLocaleDateString('ar-KW')}`;
  document.getElementById('print-table').innerHTML = `
    <!-- ملخص إجمالي -->
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:80px;background:#f0f7f0;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #1d6b3a">
        <div style="font-size:22px;font-weight:900;color:#1d6b3a">${d.students?.length||0}</div>
        <div style="font-size:10px;color:#555">الطلاب</div>
      </div>
      <div style="flex:1;min-width:80px;background:#f0f7f0;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #1d6b3a">
        <div style="font-size:22px;font-weight:900;color:#1d6b3a">${d.totals?.totalPresent||0}</div>
        <div style="font-size:10px;color:#555">إجمالي الحضور</div>
      </div>
      <div style="flex:1;min-width:80px;background:#fbe4e4;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #a3262b">
        <div style="font-size:22px;font-weight:900;color:#a3262b">${d.totals?.totalAbsent||0}</div>
        <div style="font-size:10px;color:#555">إجمالي الغياب</div>
      </div>
      <div style="flex:1;min-width:80px;background:#e0eefb;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #14568f">
        <div style="font-size:22px;font-weight:900;color:#14568f">${d.totals?.totalMemoVerses||0}</div>
        <div style="font-size:10px;color:#555">آية محفوظة</div>
      </div>
      <div style="flex:1;min-width:80px;background:#e0eefb;border-radius:10px;padding:12px;text-align:center;border-bottom:3px solid #14568f">
        <div style="font-size:22px;font-weight:900;color:#14568f">${d.totals?.totalReviewSessions||0}</div>
        <div style="font-size:10px;color:#555">جلسات المراجعة</div>
      </div>
    </div>

    <!-- جدول الطلاب -->
    <table style="width:100%;border-collapse:collapse;margin-top:8px">
      <thead>
        <tr style="background:#0a1e12;color:white">
          <th style="padding:8px 10px;text-align:right;font-size:11px">#</th>
          <th style="padding:8px 10px;text-align:right;font-size:11px">الطالب</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">حضور</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">غياب</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">جلسات الحفظ</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">آيات</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">مراجعة</th>
          <th style="padding:8px 10px;text-align:center;font-size:11px">السلوك</th>
        </tr>
      </thead>
      <tbody>${studentsRows||'<tr><td colspan="8" style="text-align:center;padding:20px;color:#888">لا توجد بيانات</td></tr>'}</tbody>
    </table>

    ${r.teacher_notes ? `
    <div style="margin-top:14px;padding:12px;background:#f5f2ea;border-radius:8px;border-right:4px solid #0a1e12">
      <strong style="font-size:12px">✍️ ملاحظات المحفظ:</strong>
      <p style="font-size:11px;margin-top:6px;line-height:1.7">${r.teacher_notes}</p>
    </div>` : ''}`;

  window.print();
}

async function showFullReport(reportId) {
  const { data: r } = await sb.from('monthly_reports')
    .select('*,teacher:profiles!monthly_reports_teacher_id_fkey(full_name)')
    .eq('id', reportId).single();
  if (!r) return;
  showReportModal(r);
}

function showReportModal(r) {
  const d = r.report_data || {};
  document.getElementById('report-view-title').textContent = `تقرير ${r.teacher?.full_name||'—'} — ${MONTHS_AR[r.month]} ${r.year}`;

  let studentsHtml = (d.students||[]).map(s => `
    <div class="student-report-row">
      <div style="font-weight:700;min-width:140px">${s.name}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge be">✓ ${s.present} حاضر</span>
        <span class="badge ba">✗ ${s.absent} غائب</span>
        <span class="badge bg">📖 ${s.memoSessions} حفظ (${s.memoVerses} آية)</span>
        <span class="badge br">🔄 ${s.reviewSessions} مراجعة</span>
        <span class="badge bp">🌟 ${s.behAvg}/5 سلوك</span>
      </div>
    </div>`).join('');

  document.getElementById('report-view-body').innerHTML = `
    <div class="stat-row" style="margin-bottom:16px">
      <div class="stat-box"><div class="num">${d.students?.length||0}</div><div class="lbl">الطلاب</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalPresent||0}</div><div class="lbl">إجمالي الحضور</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalAbsent||0}</div><div class="lbl">إجمالي الغياب</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalMemoVerses||0}</div><div class="lbl">آيات محفوظة</div></div>
      <div class="stat-box"><div class="num">${d.totals?.totalReviewSessions||0}</div><div class="lbl">جلسات المراجعة</div></div>
    </div>
    <h4 style="margin-bottom:12px;font-size:14px;font-weight:700;color:var(--gd)">🎓 تفاصيل الطلاب</h4>
    ${studentsHtml}
    ${r.teacher_notes ? `<div style="margin-top:16px;padding:14px;background:var(--gray4);border-radius:12px;border-right:3px solid var(--gold)"><strong>✍️ ملاحظات المحفظ:</strong><br><p style="margin-top:6px;font-size:13px;line-height:1.7">${r.teacher_notes}</p></div>` : ''}`;

  openM('m-report-view');
}


</script>



<div id="print-area">
  <div class="print-header">
    <img src="turath-center-logo.png" alt="شعار المركز" style="width:90px;height:90px;object-fit:contain;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto">
  </div>
  <h2 id="print-title"></h2>
  <div class="print-date" id="print-date"></div>
  <div id="print-table"></div>
  <div class="print-footer">رسالتنا تبدأ بالحرف وتمتد للأجيال</div>
</div>
