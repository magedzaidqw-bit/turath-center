<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب حذف البيانات — تراث</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; margin: 0; padding: 20px; background: #f9f9f9; color: #222; line-height: 1.8; }
  .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { color: #0a1e12; border-bottom: 3px solid #1a5230; padding-bottom: 12px; font-size: 22px; }
  p { margin-bottom: 14px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; color: #0a1e12; }
  input, textarea, select { width: 100%; padding: 10px 12px; border: 1.5px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 14px; direction: rtl; }
  textarea { height: 100px; resize: vertical; }
  button { background: #0a1e12; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
  button:hover { background: #1a5230; }
  .note { background: #f0f7f0; border-right: 4px solid #1a5230; padding: 12px 16px; border-radius: 6px; font-size: 13px; color: #555; margin-bottom: 20px; }
  .footer { margin-top: 30px; padding-top: 14px; border-top: 1px solid #eee; font-size: 12px; color: #888; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>🗑️ طلب حذف البيانات</h1>
  <p>يمكنك تقديم طلب لحذف بياناتك من نظام تراث لتحفيظ القرآن الكريم.</p>

  <div class="note">
    سيتم مراجعة طلبك من قِبل إدارة المركز والرد عليك خلال 7 أيام عمل.
  </div>

  <form action="mailto:magedzaidqw@gmail.com" method="get" enctype="text/plain">
    <div class="form-group">
      <label>الاسم الكامل *</label>
      <input type="text" name="الاسم" required placeholder="أدخل اسمك الكامل">
    </div>
    <div class="form-group">
      <label>البريد الإلكتروني المسجّل *</label>
      <input type="email" name="البريد" required placeholder="البريد الإلكتروني في النظام">
    </div>
    <div class="form-group">
      <label>نوع الطلب</label>
      <select name="النوع">
        <option>حذف جميع البيانات</option>
        <option>حذف بيانات محددة</option>
        <option>تعديل البيانات</option>
      </select>
    </div>
    <div class="form-group">
      <label>تفاصيل إضافية</label>
      <textarea name="التفاصيل" placeholder="أي تفاصيل إضافية تودّ ذكرها..."></textarea>
    </div>
    <button type="submit">📤 إرسال الطلب</button>
  </form>

  <div class="footer">
    مركز التراث لتحفيظ القرآن الكريم — فرع الجهراء<br>
    جمعية إحياء التراث الإسلامي — الكويت
  </div>
</div>
</body>
</html>
